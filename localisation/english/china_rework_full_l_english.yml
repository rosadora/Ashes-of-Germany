l_english:
  CHI_united_command: "United Command"
  CHI_united_command_desc: "It is time to unify China under a single government. It is time for the 'Warlord Era' to come to an end. This must be done via tactful diplomacy or conquest."
  CHI_the_indirect_approach: "The Indirect Approach"
  CHI_the_indirect_approach_desc: "Wang Jingwei, one of the most important members of the Kuomintang, has proposed an alternative but controversial approach to save the country from foreign invasions."
  CHI_right_wing_uprising: "Right Wing Uprising"
  CHI_right_wing_uprising_desc: "Chiang Kai-Shek is not suitable to lead the country, we need a firmer hand to move our nation forward."
  CHI_invite_wang_Jingwei: "Invite Wang Jingwei"
  CHI_invite_wang_Jingwei_desc: "We stand no chance against the Japanese, we need Mr. Wang Jingwei back in charge to reapproach the Japanese to hopefully reach a peaceful solution between our two countries. "
  CHI_strengthen_he_regime: "Strengthen the He Yingqin Regime"
  CHI_strengthen_he_regime_desc: "He Yingqin, one of the most talented generals and founder of the National Revolutionary Army, is certainly the right choice to rule the country."
  CHI_cooperate_with_japan: "Cooperate With Japan"
  CHI_cooperate_with_japan_desc: "Now is our best chance to form an alliance with Japan by joining the Greater East Asian Co-Prosperity Sphere."
  CHI_subjugation_to_japanese: "Subjugation to Japanese"
  CHI_subjugation_to_japanese_desc: "Subjugation is the only way to avoid war with Japan, to avoid the total destruction of our beloved nation."
  CHI_chinese_dignity: "Chinese Dignity"
  CHI_chinese_dignity_desc: "We must preserve the dignity of China. For now though, we lay in wait until the time is right to fight another day to restore China to her former glory."
  CHI_fight_another_day: "Fight Another Day"
  CHI_fight_another_day_desc: "Our military has avoided destruction despite our subjugation by the Japanese. We have more than enough manpower to begin training for the liberation of our homeland."
  CHI_secret_armanent: "Secret Rearmament"
  CHI_secret_armanent_desc: "We must build up our arms industry in secret, else the Japanese may catch on to our plans of independence."
  CHI_organise_the_jianguo_army: "Organise the Jianguo Army"
  CHI_organise_the_jianguo_army_desc: "The Jianguo army has been training in secret, ready to fight for our independence. It is a fully equiped and well trained fighting force, loyal to China."
  CHI_unite_the_people: "Unite the People"
  CHI_unite_the_people_desc: "The people of China are still divided, we must now unite them under a single cause - freedom."
  CHI_independence_war: "Independence War"
  CHI_independence_war_desc: "It is time we fight for our freedom from Japan."
  CHI_support_zhang_xueliang: "Support Zhang Xueliang"
  CHI_support_zhang_xueliang_desc: "Zhang Xueliang has been frustrated by Chiang Kai-shek's policy of 'first internal pacification, then external resistance'. With enough internal support, Zhang might be able to overthrow Chiang Kai-shek in a peaceful coup."
  CHI_support_chiang: "Support the Government"
  CHI_support_chiang_desc: "Chiang Kai-shek has ruled with an iron fist. However, his desire to suppress the Communists and ignore the threat from Japan worries many in his government. We must show them that there is nothing to worry about."
  CHI_a_debt_of_blood: "A Debt of Blood"
  CHI_a_debt_of_blood_desc: "The Japanese Kwantung Army killed Zhang Xueliang's father in an attempt to sway him. However, this had the complete opposite effect and made Zhang Xueliang vow to rid China of her Japanese invaders."
  CHI_tsingtao_for_peace: "Tsingtao for Peace"
  CHI_tsingtao_for_peace_desc: "China is not yet ready for war, we must buy time. We will negotitate a Non-Aggression pact with Japan by returning Tsingtao to them. Hopefully this will give us the time to unify the interior."
  CHI_delay_japanese_Invasion: "Delay Japanese Invasion"
  CHI_delay_japanese_Invasion_desc: "We can send diplomats to Japan under the pretence of peace talks and concessions, making them believe that we are willing to agree to their demands. While this is likely to keep them pleased diplomatically, it won't stop their military buildup in the north of China."
  CHI_delay_japanese_Invasion_tt: "§YJapan cannot stage the Marco Polo Bridge Incident before 1939.§!"
  CHI_reorganise_the_northeastern_army: "Reorganise the Northeastern Army"
  CHI_reorganise_the_northeastern_army_desc: "The Northeastern Army has been stuck fighting the Communists for years. With the Japanese threat looming, we must reorganise the Northeastern Army and distrubte it to other commands."
  CHI_reorganise_the_northeastern_army_tt: "Gain 10 units with 9 Infantry battalions."
  CHI_prepare_for_war: "Prepare for War"
  CHI_prepare_for_war_desc: "We must ready the nation for war. The Japanese threat is ever looming and we need to do whatever it takes to be ready."
  CHI_recruit_spies_in_kwantung: "Recruit Spies in the Kwantung Army"
  CHI_recruit_spies_in_kwantung_desc: "There are some in the Kwantung Army who are sympathetic to our cause and share our hatred of the Japanese. They are willing to betray them and cause instability in Manchuria... for a price."
  CHI_shandong_for_homeland: "Shandong for Homeland"
  CHI_shandong_for_homeland_desc: "Zhang Xueliang believes that trading Shandong for his homeland is a good deal. However, many in the country will perceive this as giving into Japanese demands."
  CHI_invite_communist_china: "Invite Communist China"
  CHI_invite_communist_china_desc: "Despite the betrayals before, we will not be able to defend China from Japan without the support of the Communists. Getting them on our side will be a huge boon to our forces."
  CHI_invite_communist_china_tt: "§RIf Communist China agrees, Communist China will become a puppet (Dominion) of China and add 30% Communism popularity in our country.§!"
  CHI_split_shanxi: "Split Shanxi"
  CHI_split_shanxi_desc: "The warlords have too much power and autonomy. They present an ever-increasing threat to our government by the day. It is time to bring Shanxi into our fold."
  CHI_split_xibei: "Split Xibei"
  CHI_split_xibei_desc: "The warlords have too much power and autonomy. They present an ever-increasing threat to our government by the day. It is time to bring Xibei into the fold."
  CHI_second_kmt_ccp_cooperation: "Second KMT-CPC Cooperation"
  CHI_second_kmt_ccp_cooperation_desc: "In these times of political instability, we must make sure the Communists will be willing to co-operate with our government for now."
  CHI_second_betrayal: "The Second Betrayal"
  CHI_second_betrayal_desc: "We have built up enough support within China to the point where we no longer need the Communists. Time to unify China completely!"
  CHI_secure_internal_support: "Secure Internal Support"
  CHI_secure_internal_support_desc: "There are still many that don't agree with Zhang Xueliang's leadership. We must show them that he is our best hope to defend China from Japan."
  CHI_national_Southwestern_associated_university: "National Southwestern Associated University"
  CHI_national_Southwestern_associated_university_desc: "With the threat of Japan to the North of our country, The Nankai University, Peking University, and Tsinghua University in Hebei, some of the country's most prestigious and modern institutions of higher learning and research, have agreed to move their institutions Southwards."
  CHI_seek_german_support: "Seek German Support"
  CHI_seek_german_support_desc: "The German government has supported our military buildup for years. With the improving of relations between our two countries, they may be willing to support us further."
  CHI_seek_german_support_tt: "Gain 3 German-Equipment Divisions and the basic artillery technology."
  CHI_purchase_german_weapons: "Purchase German Weapons"
  CHI_purchase_german_weapons_desc: "Our domestic arms industry is weak. We should consider purchasing effective German weapons."
  CHI_restore_beiyang_government: "Proclaim the Second Beiyang Government"
  CHI_restore_beiyang_government_desc: "Before the Japanese invasion of Manchuria, the Beiyang Army ruled the region and even the whole nation. It is time for us to proclaim ourselves the successor of the Beiyang Government."
  CHI_centralise_power: "Centralise Power"
  CHI_centralise_power_desc: "It is time to bring the warlords into our fold and centralize power. Our nation is stronger united!"
  CHI_pressure_ma_bufang: "Pressure Ma Bufang"
  CHI_pressure_ma_bufang_desc: "The warlords have too much power and autonomy. We must Pressure Ma Bufang before he grows out of control."
  CHI_pressure_long_yun: "Pressure Long Yun"
  CHI_pressure_long_yun_desc: "The warlords have too much power and autonomy. We must Pressure Long Yun before he grows out of control."
  CHI_pressure_li_zongren: "Pressure Li Zongren"
  CHI_pressure_li_zongren_desc: "The warlords have too much power and autonomy. We must Pressure Li Zongren before he grows out of control."
  CHI_pressure_sheng_shicai: "Pressure Sheng Shicai"
  CHI_pressure_sheng_shicai_desc: "The warlords have too much power and autonomy. We must Pressure Sheng Shicai before he grows out of control."
  CHI_formalise_alliance_with_germany: "Formalize the Alliance with Germany"
  CHI_formalise_alliance_with_germany_desc: "Germany has been our only friend during our War of Resistance against Japan. We should formalize our alliance by joining the Axis Powers."
  CHI_renounce_nine_power_treaty: "Renounce the Nine Power Treaty"
  CHI_pick_a_fight_with_japan_m: "Pick a Japanese Fight"
  CHI_pick_a_fight_with_japan_m_desc: "Japan, being the Dominant Asian power is in a position where they will not expect a fight. We must take advantage of this and strike while they are distracted."
  CHI_renounce_nine_power_treaty_desc: "The Nine Power Treaty, one of the unequal treaties imposed upon us by the western powers and Japan. It did little to protect us from Japanese aggression. There is no reason why we should continue to uphold this treaty if the western powers cannot uphold their promises to us."
  CHI_join_anti_comintern_pact: "Join the Anti-Comintern Pact"
  CHI_join_anti_comintern_pact_desc: "Communism is the plague on Earth and is a threat to our society. We should join this pact to deter any attack from the Soviets."
  CHI_pressure_yan_xishan: "Pressure Yan Xishan"
  CHI_pressure_yan_xishan_desc: "The warlords have too much power and autonomy. We must Pressure Yan Xishan before he grows out of control."
  CHI_war_against_ussr: "War With the USSR"
  CHI_war_against_ussr_desc: "The Soviet threat is ever looming. It is time to rid Communism from our borders and the entire world."
  CHI_german_military_advisory: "German Military Advisory"
  CHI_german_military_advisory_desc: "Germany has sent military advisors such as Alexander von Falkenhausen to China, assisting us in modernizing our armed forces. We should request Germany for further support."
  CHI_kwantung_army_collaboration: "Kwantung Army Collaboration"
  CHI_kwantung_army_collaboration_desc: "There are some within the Kwantung Army that have grown tired of the endless war and their military government in Tokyo. We could find and exploit ones seeking to end this cycle, using them to our advantage."
  CHI_conquer_warlords: "Conquer Warlords"
  CHI_conquer_warlords_desc: "It is time to bring the warlords into our fold and centralize power. Our nation is stronger united!"
  CHI_chinese_aggression: "Chinese Aggression"
  CHI_chinese_aggression_desc: "The country has been united once more, and is on the path of becoming a global superpower. We are done being on the defensive. It is time for our nation to strike out and reclaim our former glory."
  CHI_defeat_the_japanese: "Defeat Japanese"
  CHI_defeat_the_japanese_desc: "The Japanese still occupy our beautiful country. We must work to drive these Guizi out!"
  CHI_reclaim_lost_territories: "Reclaim the Lost Territories"
  CHI_reclaim_lost_territories_desc: "The 'Century of Humiliation' suffered by our country during the late Qing Dynasty had us sign numerous unequal treaties with the western powers and Japan, giving them trade and economical priviliges. We also lost numerous territories to Russia, Japan, and Great Britain. With the Japanese defeated and our country fully Unified, it is time for us to atone for the sins of the weak and corrupt Qing Dynasty."
  CHI_retake_south_tibet: "Retake South Tibet"
  CHI_retake_south_tibet_desc: "The Tibet experiment has completely failed. We should give it the proper conclusion it deserves - reintegrated into our country."
  CHI_retake_outer_manchuria: "Retake Outer Manchuria"
  CHI_retake_outer_manchuria_desc: "Outer Machuria was lost to the Russian Empire through the Treaty of Aigun in 1858 and the Convention of Peking in 1860. It is time we reclaim these territories."
  
  CHI_wartime_industrialisation: "Wartime Industrialization"
  CHI_wartime_industrialisation_desc: "Our country is at war. We need to focus on industrialization in order for us to achieve Victory."
  CHI_hanyang_steel_company: "Hanyang Arsenal"
  CHI_hanyang_steel_company_desc: "The Hanyang Arsenal is one of the biggest arsenals in all of China. However, the quality of arms it produces is poor due to lackluster steel. We must expand the arsenal to properly produce weapons that are up to standard."
  CHI_chongqing_iron_and_steel_company: "Chongqing Iron and Steel Company"
  CHI_chongqing_iron_and_steel_company_desc: "We should expand the Hanyang Arsenal more and open an additional steel plant to give us even more raw materials for arms production."
  CHI_develop_taoxikeng_tungsten_mine: "Develop Taoxikeng Tungsten Mine"
  CHI_develop_taoxikeng_tungsten_mine_desc: "Tungsten is crucial to the production of arms, especially artillery pieces, which we desperately lack. We should expand the Taoxikeng Mine to ensure we have enough raw materials."
  CHI_wartime_resources_policy: "Wartime Export Policy"
  CHI_wartime_resources_policy_desc: "War demands a different economic policy. We can no longer abide with the trade stipulations of the Nine-Power Treaty and need to focus all our resources towards winning the war."
  CHI_commie_spies: "Root Out Communist Spies"
  CHI_commie_spies_desc: "Communists Spies in our country has been sowing chaos and instability across the provinces. We must root them out."
  CHI_develop_the_longhai_railway: "Develop the Longhai Railway"
  CHI_develop_the_longhai_railway_desc: "Railway and infrastructure is the backbone to a country's economy and development. We must expand the Longhai Railway."
  CHI_develop_the_yuehan_railway: "Develop the Yuehan Railway"
  CHI_develop_the_yuehan_railway_desc: "Railway and infrastructure is the backbone to a country's economy and development. We must expand the Yuehan Railway."
  CHI_establish_department_of_transportation: "Establish Department of Transportation"
  CHI_establish_department_of_transportation_desc: "Establishing a Department of Transportation will help us better organize infrastructure and railway construction, and is crucial to developing our economy."
  CHI_fortify_beijing: "Fortify Beijing"
  CHI_fortify_beijing_desc: "Beijing is extremely vulnerable to a Japanese attack. We must fortify it to protect our industry and universities there."
  CHI_defend_yellow_river: "Defend Yellow River"
  CHI_defend_yellow_river_desc: "Our army is woefully prepared to fully defend the exposed north of our country. Therefore, we need to construct a fallback line to wage a war of attrition on the Yellow River."

  CHI_sun_legacy: "Dr. Sun Yat-Sen's Legacy"
  CHI_sun_legacy_desc: "Dr. Sun Yat-Sen established the 'Three Principles of the People' and planted the seeds of Democracy and liberty in our country. We should seek to carry on this legacy and bring liberty and freedom to our people."
  CHI_five_power_constitution: "Five-Power Constitution"
  CHI_five_power_constitution_desc: "Dr. Sun Yat-Sen proposed the Five-Power Constitution back in 1906, as a means through which Democracy could be implemented in China. We should seek to implement this constitution as soon as possible."
  CHI_the_true_democracy: "The True Democracy"
  CHI_the_true_democracy_desc: "After years of authoritarian rule from multiple governments, the people of China desire true Democracy."
  CHI_first_national_assembly: "First National Assembly"
  CHI_first_national_assembly_desc: "The first step of moving the country towards a true Democracy is to form a national assembly, consisting of all major political parties across the country."
  CHI_secure_kmt_majority: "Secure KMT Majority"
  CHI_secure_kmt_majority_desc: "While political freedom should be guarenteed for all, the need for a strong government in these turbulent times means the KMT must remain in power to unite the people against foreign and internal threats."
  CHI_first_election: "First Election"
  CHI_first_election_desc: "Everything is in place for a Democratic system to be fully implemented in China. It is time for our first election."

  CHI_supervised_democracy: "Supervised Democracy"
  CHI_supervised_democracy_desc: "Though Dr. Sun Yat-Sen planted the seeds of Democracy in this country, China has always been ruled by monarchist Empires and authoritarian governments, and lacks a long tradition of Democracy unlike many western countries. Therefore, it is necessary for a the military to oversee the transition to Democracy."
  CHI_empower_the_army: "Empower the Army"
  CHI_empower_the_army_desc: "In these turbulent times, where foreign and internalthreats seek to destabilize China, the army's support is more crucial than ever in securing stability and security for China."
  CHI_secure_army_support: "Secure Army's Support to Democracy"
  CHI_secure_army_support_desc: "Now that the Army has been given extensive powers to control our country, we must ensure their loyalties in transitioning our country into a Democracy."
  CHI_military_guided_goverment: "Military Tutelage"
  CHI_military_guided_goverment_desc: "Our newborn Democracy is fragile. The army, now empowered and supportive of our Democratic ways, must be used to safeguard our progress."
  CHI_return_power_to_people: "Return Power to the People"
  CHI_return_power_to_people_desc: "The majority of people in our country are now supportive of our Democratic ways. It is time to return the power to a civilian governemnt and have our first election."
  CHI_suppress_the_communists: "Suppress the Communists"
  CHI_suppress_the_communists_desc: "The Communists desire one party rule and will forever be a threat to our Democratic ways. We must suppress and eliminate them."
  CHI_legalise_communist_party: "Legalise the Communist Party"
  CHI_legalise_communist_party_desc: "Democracy and political freedom for all means even our former opponents, the Communists, should be allowed to legally enter elections and hold seats in the National Assembly. We should work with them to determine the best vision for China together."
  CHI_coalition_goverment: "Coalition Government"
  CHI_coalition_goverment_desc: "The Communists still enjoy widespread support in our country, especially in the rural regions. We should form a coalition government with them to appeal to the masses and increase public support of our regime."
  CHI_summit_with_mao: "Allow Communists into Government"
  CHI_summit_with_mao_desc: "The people have spoken, and they want Communists in the government. We should listen to their demands."
  CHI_strengthen_the_central_secretariat: "Bring Socialists into the Cabinet"
  CHI_strengthen_the_central_secretariat_desc: "With many Communists and Socialists now in the government, we must decide on the political path that China will walk - Whether to pursue Communism fully, partially, or retain a Democractic system."
  CHI_marxist_orthodoxy: "Marxist Orthodoxy"
  CHI_marxist_orthodoxy_desc: "The Communist party have gained significant support in China and has been voted into power. Wang Ming has taken leadership of the country and plans to pursue Marxism fully."
  CHI_soviet_leadership: "Soviet Leadership"
  CHI_soviet_leadership_desc: "The Soviet Union stands as the premier country on the path towards full Communism. We should acknowledge this and learn from their example."
  CHI_soviet_economic_aid: "Soviet Economic Aid"
  CHI_soviet_economic_aid_desc: "The economic situation in China will take generations to overcome without outside help. We should approach the Soviets to ask for economic assistence."
  CHI_internationalism: "Internationalism"
  CHI_internationalism_desc: "The workers and peasants of the world must unite to cast off their shakles. Shoulder to shoulder, we will build a better future."
  CHI_agrarian_socialism: "Agrarian Socialism"
  CHI_agrarian_socialism_desc: "The Communist party have gained significant support in China and has been voted into power. Mao Zedong has taken leadership of the party and plans to pursue Agrarian Socialism fully."
  CHI_rectification_campaign: "Rectification Campaign"
  CHI_rectification_campaign_desc: "There have been a number of misconceptions about the course our struggle should take. We should give the misguided comrades a chance to acknowledge the error of their ways."
  CHI_maoism: "Maoism"
  CHI_maoism_desc: "The Great Chairman has spent long months developing his political theories into a coherent ideology that will guide our country forward."
  CHI_socialism_with_chinese_characteristics: "Socialism with Chinese Characteristics"
  CHI_socialism_with_chinese_characteristics_desc: "Although no doubt brilliant, Marx wrote from a specifically European perspective. China's particular situation will be reflected in our implementation of socialist policies."
  CHI_social_democracy: "Social Democracy"
  CHI_social_democracy_desc: "The Communist party have gained significant support in China, and many of its members are in positions of power. The various parties of the country have agreed to pursue the path of Social Democracy fully."
  CHI_admin_reforms: "Administrative Reforms"
  CHI_admin_reforms_desc: "Our nation is vast and underdeveloped. The administration of country must be reformed to better the lives of our people."
  CHI_increase_education: "National Enlightenment"
  CHI_increase_education_desc: "The majority of our population does not even know how to read. By expanding education everywhere across our country, we will enlighten our fellow countrymen."
  CHI_regional_development: "Regional Development"
  CHI_regional_development_desc: "Our country is vast, and her territories varies greatly in culture, terrain, and climate. We should focus on regional development for each of them."
  
  CHI_bastion_of_democracy_in_asia: "The Asian Bastion of Democracy"
  CHI_bastion_of_democracy_in_asia_desc: "We have become the largest Democracy of the world. It is our duty to take on the mantle of defending freedom for all in our hemisphere."
  CHI_trans_pacific_cooperation_organisation: "Form the APCO"
  CHI_trans_pacific_cooperation_organisation_desc: "The Asia-Pacific Cooperation Organisation, or APCO, is an organization that will promote political, economical, and cultural exchanges throughout Asia. No longer will countries stand alone and fall to imperialism, for we will defend their libery and freedom!"
  CHI_invite_australia: "Invite Australia"
  CHI_invite_australia_desc: "We should invite Australia to the APCO. Australia's position in the south Pacific is of crucial stratetgic importance to us."
  CHI_invite_new_zealand: "Invite New Zealand"
  CHI_invite_new_zealand_desc: "We should invite New Zealand to the APCO. New Zealand's position in the south Pacific is of crucial stratetgic importance to us."
  CHI_invite_canada: "Invite Canada"
  CHI_invite_canada_desc: "We should invite Canada to the APCO. Canada's position in North America helps to better keep the Pacific under our control."
  CHI_invite_indonesia: "Invite Indonesia"
  CHI_invite_indonesia_desc: "We should invite Indonesia to the APCO. Indonesia's vast amounts of natural resources and position in the middle Pacific as 'stationary' aircraft carriers is of crucial strategic importance to us."
  CHI_invite_raj: "Invite India"
  CHI_invite_raj_desc: "We should invite India to the APCO. India's vast amounts natural resources, population, and position in the Indian ocean allows our organization to reach deep into the Middle East and Africa."
  CHI_invite_asian: "Asian Memberships"
  CHI_invite_asian_desc: "The petty nations in Asia are in need of protection from foreign powers and themselves. We should invite them to APCO."
  CHI_invite_latin: "Latin American Memberships"
  CHI_invite_latin_desc: "Latin America has always been politically unstable. By inviting them to the APCO, we can help them solve disputes and turn them towards Democracy."
  CHI_go_with_britain: "Go with Britain"
  CHI_go_with_britain_desc: "We are not fully ready to stand side by side with the giants of the world. Therefore, we must repeat what Japan did back in the early 20th century by allying with a great power - Great Britain."
  CHI_form_cni: "Form the CBI Theater Command"
  CHI_form_cni_desc: "We should ask Britain to form the China-Burma-India Theater Command, to better defend against threats our peoples face by foreign powers."
  CHI_singapore_strategy: "The Singapore Strategy"
  CHI_singapore_strategy_desc: "The Singapore Strategy is dated and flawed. We must revise it to better protect our southern flank."
  CHI_french_indochina: "Protect French Indochina"
  CHI_french_indochina_desc: "Indochina has been under French influence since the 19th century. With Germany looming over the French mainland in Europe, we should ask them to hand over Indochina to us to better protect these territories."
  CHI_chinese_welfare: "Livelihood"
  CHI_chinese_welfare_desc: "The past century has not treated the our population well. They suffer from a lack of food, education, and healthcare. It is time we implemented the third of Dr. Sun Yat-Sen's three principles - Social Welfare."
  CHI_chinese_livelihood: "Introduce Welfare System"
  CHI_chinese_livelihood_desc: "We should begin by establishing a Welfare Commission to handle all affairs related to social welfare."
  CHI_reform_land: "Land Reforms"
  CHI_reform_land_desc: "Petty landlords and local nobles still own the majority of land in our country. We should forcefully seize some of that land and redistribute them to the common people."
  CHI_agriculture_reform: "Agriculture Reforms"
  CHI_agriculture_reform_desc: "Agriculture is tightly controlled by local landlords and nobles, superficially jacking the prices of food up. By forcefully pushing through agricultural reforms, we can relieve the food crisis in our country."
  CHI_employment_reform: "Employment Reforms"
  CHI_employment_reform_desc: "Much of our population is destitute and live in poverty due to unemployment and a lack of jobs. We should aim to create government sponsored jobs in the labor and agriculture fields so every commoner can be employed."
  CHI_union_reform: "Reorganize the Unions"
  CHI_union_reform_desc: "Internal instability from warring factions within our country has all but shattered organized unions for workers. We should encourage them to be reorganized to better fight for the rights of workers."
  CHI_chinese_education: "Department of Education"
  CHI_chinese_education_desc: "Much of our population is uneducated. By creating the Department of Education to organize and fund education efforts across our country, we can ensure every Chinese citizen can go to school and learn."
  CHI_new_culture_movement: "New Culture Movement"
  CHI_new_culture_movement_desc: "Traditional Chinese culture is rotten and deficient. We should aim to reform our culture with the New Culture Movement to promote equality and freedom."
  CHI_womens_liberation: "Women's Liberation"
  CHI_womens_liberation_desc: "Women have tradtionally been relegated to being housewives and caretakers. It is time we liberate them from these constraints and allow them to pursue their own interests."
  CHI_education_act: "Public Schooling"
  CHI_education_act_desc: "There is still a lack of public schooling in our country, as private ones dominate. It is our duty to invest more in public schooling efforts where the common citizen can go get educated in."
  CHI_standardise_chinese: "Standardise Chinese Language"
  CHI_standardise_chinese_desc: "There are multiple dialects of the Chinese language spoken across our country. We shouldn't suppress them - but creating a standardized version of our language, Mandarin, is crucial for national unity."
  CHI_chinese_economy: "Economic Reforms"
  CHI_chinese_economy_desc: "Our economy is still in tatters and extremely localized. Massive reforms are needed to bring it up to a modern standard."
  CHI_new_currency: "Introduce A New Currency"
  CHI_new_currency_desc: "Our current currency is worth almost nothing, with foodstuffs such as grain and wheat becoming the real currency. We need to introduce a new currency to restore the people's trust in our economy once again."
  CHI_central_bank: "Establish the Central Bank"
  CHI_central_bank_desc: "Private, local banks dominate the finance sector in our country. We need to establish a central bank to control the flow of currency throughout our country directly."
  CHI_nationalisation: "Nationalization"
  CHI_nationalisation_desc: "Foreign industries has long enjoyed enhanced financial privileges due to the unequal treaties and are built to only extract resources from our country. We should nationalize them to use for ourselves."
  CHI_repay_debt: "Repay Foreign Debts"
  CHI_repay_debt_desc: "The foreign powers has allowed us to nationalize their industries in China - at a price. They demand we pay them the losses caused due to our nationalization policy."
  CHI_silver_standard: "Retain the Silver Standard"
  CHI_silver_standard_desc: "Our current currency is worth almost nothing, with foodstuffs such as grain and wheat becoming the real currency. We need to retain the Silver Standard in order to make people regain confidence in our currency."
  CHI_treasury: "Recount the State Treasury"
  CHI_treasury_desc: "The State Treasury is almost completely unaccoutned for due to corruption and nepotism. We need to do a full recount of it to gauge our financial situation properly."
  CHI_privatisation: "Privatization"
  CHI_privatisation_desc: "Foreign industry, although built upon the exploitation of our country through the unequal treaties, are the leaders in their respective fields in our country. We should allow them to continue operating, albeit now for us."
  CHI_control_inflation: "Control Inflation"
  CHI_control_inflation_desc: "Our fiscal reforms have caused inflation to rise at an unprecedented rate. We must intervene before it gets out of our control."
  CHI_second_golden_decade: "The Second Golden Decade"
  CHI_second_golden_decade_desc: "It is hardly believable that just two decades ago, China was embroiled in civil strife, with warlords tearing our country apart and our economy in complete tatters from being exploited by imperial powers. We have now entered our second 'Golden Decade', all thanks to the Chinese that worked hard to resurrect our country."

  CHI_military_branch: "Ministry of National Defense"
  CHI_military_branch_desc: "War is looming. We need to establish the Ministry of National Defense to coordinate our military actions."
  CHI_equipment_effort: "Equipment Division"
  CHI_equipment_effort_desc: "Our equipment is insufficient and outdated. We need to create a Equipment Division to better develop our infantry equipment."
  CHI_motorization_effort: "Motorization Division"
  CHI_motorization_effort_desc: "Our country is rural and without much infrastructure. We need to create a Motorization Division to develop vehicles."
  CHI_doctrine_effort: "War Plan Division"
  CHI_doctrine_effort_desc: "Our army is incapable of waging a modern war. We need to create a War Plan Division to further study tactics and strategy."
  CHI_tank_production: "Tank Division"
  CHI_tank_production_desc: "Tanks will surely play a major role in the next period of warfare. We need to create a Tank Division to study and develop armored vehicles."
  CHI_antitank_production: "Anti-Tank Division"
  CHI_antitank_production_desc: "Tanks will surely play a major role in the next period of warfare. Our industry is not fit to produce enough armored vehicles to have an impact. Therefore, we need to create an Anti-Tank Division to study anti-tank warfare."
  CHI_aviation_effort: "Air Force Command Headquarters"
  CHI_aviation_effort_desc: "The importance of air power has already demonstrated itself during the Great War. Establishing an Air Force Command Headquarters is a crucial first step to modernizing ours."
  CHI_army_effort: "Army Command Headquarters"
  CHI_army_effort_desc: "Our army is disorganized and underequipped. Establishing an Army Command Headquarters is necessary to get the army back on its feet."
  CHI_naval_effort: "Navy Command Headquarters"
  CHI_naval_effort_desc: "A modern navy is crucial to defending ourselves from distant foreign powers. We should establish a Navy Command Headquarters to help modernize our tiny navy."
  CHI_fighter_focus: "Chinese Fighter Production"
  CHI_fighter_focus_desc: "We cannot trust foreign powers to be able to sell us fighters all the time. Being able to produce our own is a top priority."
  CHI_fighter_order: "Order Foreign Fighters"
  CHI_fighter_order_desc: "We do not have enough industrial capacity to produce fighters. Foreign designs are more advanced and produced more consistently."
  CHI_aviation_effort_2: "Elite Air Division"
  CHI_aviation_effort_2_desc: "The best pilots and pioneers of aviation should be invited to China to help instruct and modernize our airforce."
  CHI_CAS_effort: "CAS Division"
  CHI_CAS_effort_desc: "Close Air Support will help reduce casualties significantly. Investment in good bombers is crucial."
  CHI_rocket_research: "Rocketry Innovations"
  CHI_rocket_research_desc: "The means to wage war is always advancing. Leaked documents from abroad describes research into devices called 'rockets'. We should try to manufacture our own."
  CHI_NAV_effort: "Naval Air Force Division"
  CHI_naval_effort_desc: "Taking off and landing from a land base is much different than from a moving ship. A sepearate division is needed to develop and research techniques related to this."
  CHI_large_navy: "Legacy of the Beiyang Navy"
  CHI_large_navy_desc: "The Beiyang Navy was one of the largest and most advanced navies of its time. We should strive to achieve its glory once more."
  CHI_flexible_navy: "Affordable Morden Navy"
  CHI_flexible_navy_desc: "Building a modern navy takes a lot of time. Instead of chasing the unrealistic wet dreams of a large and supreme navy, we should aim to keep our spending in check while modernizing."
  CHI_submarine_effort: "Submarine Division"
  CHI_submarine_effort_desc: "German submarines during the Great War wreaked havoc on shipping. A submarine division is required to study the ways of convoy-raiding warfare."
  CHI_cruiser_effort: "Cruiser Division"
  CHI_cruiser_effort_desc: "Cruisers are the backbone of a navy. Modernizing our cruisers is a top priority."
  CHI_destroyer_effort: "Destroyer Division"
  CHI_destroyer_effort_desc: "Destroyers perform many crucial tasks in a navy, such as screening and ASW. Modernizing them is required for an organized navy."
  CHI_capital_ships_effort: "Restore the Beiyang Glory"
  CHI_capital_ships_effort_desc: "Capital ships such as the ones in the Beiyang Navy are the real tools of power projection, not petty cruisers and destroyers. We must strive to build many Carriers and Battleships."
  CHI_land_effort: "High Calibre Weaponry"
  CHI_land_effort_desc: "While small calibre weaponry is sufficient for basic combat, large calibre weaponry is required to effectively reduce casualties and break through tough positions. Development of such weapons are a top priority."
  CHI_sea_effort: "Modernizing our Navy"
  CHI_sea_effort_desc: "Naval warfare consists much more than just ship to ship combat. By furthering R&D into new naval technologies, we can truly rule the waves."
  CHI_rocket_effort: "Rocket Advancements"
  CHI_rocket_effort_desc: "A further development of rockets and rocket engines is necessary to wage war in this and the next period of warfare."
  CHI_nuclear_research: "Nuclear Research"
  CHI_nuclear_research_desc: "Nuclear energy has vast potential to be the dominating force of both warfare and power generation in this century. We must focus research efforts to not fall behind the other great powers."
  CHI_qingdao_aid: "Lease Qingdao to Germany"
  CHI_qingdao_aid_desc: "Qingdao has been one of Germany's colonies in the east. The Germans are willing to pay a heafty upfront price for the return of this city to them."

  CHI_monarchism: "Monarchism"
  CHI_monarchism_desc: "After the fall of the Qing Dynasty, various governments have ruled and failed to keep China stable. Only by returning to dynastic rule granted by the Heavens can China truly be stable once more."
  CHI_need_emperor: "The Need for an Emperor"
  CHI_need_emperor_desc: "There are many dynastic factions within China. However, there will only be one that can claim the Mandate of Heaven."
  CHI_purge_republicans: "Purge Republicans"
  CHI_purge_republicans_desc: "In order to prepare the country's return to dynastic rule, the corrupt and rotten KMT Republicans must be purged fully."
  CHI_manchu_resistance: "Encourage Manchurian Resistance"
  CHI_manchu_resistance_tt: "§YJapan cannot stage the Marco Polo Bridge Incident until order is restored in Manchuria.§!"
  CHI_manchu_resistance_desc: "The Qing Dynasty was unjustly overthrown in the 1911 Xinhai Revolution. It is time to bring the last Emperor, Aisin Gioro Puyi, back to China."
  CHI_restorationists: "Spread Restorationist Propaganda"
  CHI_restorationists_desc: "The people of China are uneducated and uncritical. We should take advantage of this and spread propaganda to sway them to our cause."
  CHI_return_loyalists: "Qing Loyalists Return"
  CHI_return_loyalists_desc: "With enough support, Qing loyalists and royals have returned to our country to reclaim what was theirs."
  CHI_rescue_the_emperor: "Rescue the Emperor"
  CHI_rescue_the_emperor_desc: "The Emperor Aisin Gioro Puyi had been lured to Manchuria by the Japanese on false promises. We must rescue him from their clutch."
  CHI_show_japanese_crimes: "Advertise Japanese Crimes"
  CHI_show_japanese_crimes_desc: "The Japanese occupiers committed countless crimes agaisnt humanity against the population of Manchuria. Now the entirety of China will know."
  CHI_coronation: "Coronation"
  CHI_coronation_desc: "With the return of Puyi, a coronation ceremony is necessary to legitimize his rule."
  CHI_royal_guard: "Establish the Imperial Guards"
  CHI_royal_guard_desc: "The military is full of members sympathetic to the Republicans, and cannot be fully trusted at the moment. Establishing a corp of Imperial Guards loyal only to the Emperor will protect our hold on power."
  CHI_qing_subjugate_the_warlords: "Subjugate the Warlords"
  CHI_qing_subjugate_the_warlords_desc: "The Warlords of China are still at large and should be reintegrated into our resurgent Chinese Empire."
  CHI_qing_anti_communism: "Anti-Communism"
  CHI_qing_anti_communism_desc: "The Communists are sworn enemies of monarchism and dynastic rule, and still control various Chinese territories. They are the biggest threat to our hold on power - wipe them out!"
  CHI_return_bejing: "Return to the Forbidden City"
  CHI_return_bejing_desc: "The Nationalist Government moved the capital of China to Nanjing to distance themselves from the dynasties. It is time to return to the Forbidden City."
  CHI_five_equals: "Five Equal Peoples"
  CHI_five_equals_desc: "The days in which one people could rule supreme over all others are over. China will be a new type of nation, in which five peoples - Koreans, Russians, Mongolians, Chinese and Manchus - will live together in harmony."
  CHI_establish_parliament: "Establish Parliament"
  CHI_establish_parliament_desc: "Absolute Monarchism is outdated and inefficient. We should move to becoming a Constitutional Monarchy after the Swedish and British models by establishing a parliament."
  CHI_listen_advisors: "Heed Advisors"
  CHI_listen_advisors_desc: "The Emperor is inexperienced in the art of political affairs. Heeding the advice of his experienced advisors is necessary to ruling the country efficiently."
  CHI_constituional_monarchy: "Constitutional Monarchy"
  CHI_constituional_monarchy_desc: "We have successfully established a Constitutional Monarchy. Now, the people hold power with the Emperor as the symbolic head-of-state. Our country has become truly enlightened."
  CHI_manchu_court: "Staff the Court with Allies"
  CHI_manchu_court_desc: "The Emperor is inexperienced at ruling, and to keep him in power, it is necessary to staff the court with only allies most loyal to the Emperor."
  CHI_imperial_divinity: "Imperial Divinity"
  CHI_imperial_divinity_desc: "With the fall of the Qing, the belief in the Mandate of Heaven has all but disappeared. By spreading propaganda glorifying the reclaimation of the Mandate by our current Emperor, we can once again restore the sense of Imperial Divinity the people had in the Emperors of China."
  CHI_powerful_emperor: "All Powerful Emperor"
  CHI_powerful_emperor_desc: "To stabilize our shattered country, the Emperor must have all powers necessary to lead our country out of darkness."
  CHI_old_ways: "Return to the Old Ways"
  CHI_old_ways_desc: "We have successfully reunited China under the [CHI.GetName], and is powerful enough to determine our own fate. Onwards, sons and daughters of the [CHI.GetName]!"
  CHI_new_dynasty: "New Dynasty"
  CHI_new_dynasty_desc: "The old dynasties of the Ming and Qing both fell because of their weakness and corruption. China will not walk their disastrous paths of self-destruction again."
  CHI_invite_shang: "Descendant of Confucius"
  CHI_invite_shang_desc: "The best candidate we have to establish a new Dynasty would be the 77th generation descendent of Conficious, Duke Yansheng."
  CHI_promise_fair_society: "Promise a Fair Society"
  CHI_promise_fair_society_desc: "The old dynasties ruled with an iron first and heavily suppressed commoners, only helping them when it the elites were affected. This will never happen again."
  CHI_crown_new_emperor: "Emperor of the People"
  CHI_crown_new_emperor_desc: "Duke Yansheng will be an Emperor of the People - willing to fight for the rights and liberties of all in the Empire regardless of race, religion, and status."
  CHI_new_national_identity: "New National Identity"
  CHI_new_national_identity_desc: "With political affairs settled, we must united the people of the Empire. What better way than a wave of propaganda to stir nationalist sentiments?"
  CHI_old_dynasty: "Old Dynasty"
  CHI_old_dynasty_desc: "Before the Barbaric Qing Dynasty, the Ming were the masters of east Asia. Multiple tributaries paid respect to the Emperor in Beijing, while Zheng He's voyages extended the Empire's reach further than ever. We should strive to return to those days."
  CHI_find_heir: "Find Heir to the Throne"
  CHI_find_heir_desc: "The Ming's descendants are all but scattered across the wind, no one knowing where to find an appropriate heir to the throne. However, we do have some knowledge about the wearabouts the last 'Marquis of Extended Grace'..."
  CHI_encourage_han: "Encourage Han Supremacy"
  CHI_encourage_han_desc: "The other races in China, especially the Manchus, set the country back significantly when they established their backwards Qing Dynasty. Under the Han dynasties, China flourished and prospered. Therefore, the Han must rein supreme."
  CHI_promise_return_goldera: "Promise a Reformed Empire "
  CHI_promise_return_goldera_desc: "The Ming Dynasty fell because of internal corruption and poor fiscal policies from isolation. Only by promising reforms can we avoid walking the same path."
  CHI_ming_empire: "Ming Empire Returns"
  CHI_ming_empire_desc: "Despite the unlikelihood of a Ming restoration, we have succeeded where others failed 300 years ago. The Great Ming once again rule China."
  CHI_ming_generals: "Experienced Leadership takes Charge"
  CHI_ming_generals_desc: "Our Emperor is inexperienced due to years of not holding real power, with our regime unpopular and illegitimate. Therefore, it is prudent to have more capable leadership take charge of China - an experienced privy council."
  CHI_modern_empire: "Modernise the Empire"
  CHI_modern_empire_desc: "We must not fall into the same trappings of Chinese superiority and isolationism as the Ming and Qing did. Only by focusing on science and development can we keep up with foreign powers."

