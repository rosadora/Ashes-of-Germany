  news.1001.t: "Emperor Hirohito Injured In Manchuria"
  news.1001.desc: "Emperor Hirohito was invited by the Kwantung Army to a parade in Mukden to show off their total control of Manchukuo and to celebrate their recent military successes in China. His Majesty's cruise landed in Dalian, where the Emperor then took a train to Mukden. The train was severely damaged by a huge explosion, likely from explosives planted by Chinese spies, when it passed Huanggutun station near Mukden. The Emperor is still alive according to the Kwuantung Army, but they refuse to release more information about the Emperor's condition. This is ironic, considering the Huanggutun incident in 1928, when Zhang Zuolin, who was the head-of-state of China and the father of the current Chinese leader Zhang Xueliang, was assassinated."
  news.1001.a: "What a coincidence!"
  news.1001.b: "Someone will be shot for this!"
  news.1001.c: "Interesting."
  news.1002.t: "Emperor Hirohito Died!"
  news.1002.desc: "Emperor Hirohito passed away this morning, after three months of being injured from the Mukden explosion. The Emperor has remained unconscious and stayed at a army hospital in Mukden until he passed away today. With his death, the Japanese Chief-of-Army, Tojo Hideki, claimed leadership of Japan. Tojo vowed to return power to the new Emperor Akihito in the future, who is too young to lead the country at the moment. The Emperor's death shook Japan's population to their cores, with two weeks of mourning being declared."
  news.1002.a: "Seems like Zhang finally got his revenge."
  news.1002.b: "The Chinese will pay for this!"
  news.1003.t: "Emperor Hirohito Returned to Tokyo"
  news.1003.desc: "Emperor Hirohito showed himself in public for the first time after his injury in Manchuria. His Majesty seems to have fully recovered, but no one could really tell as the Emperor was surrounded by more than a hundred royal guards!"
  news.1003.a: "Injuring the dog is better than doing nothing."
  news.1003.b: "The Emperor is well protected now."
  wtt_china.1001.t: "[From.GetLeader]'s Invitation"
  wtt_china.1001.desc: "The government led by [From.GetLeader] made its first step towards a peaceful solution to the Communist uprising, by offering the formation of a coalition government while the Communists keep their autonomy."
  wtt_china.1001.a: "Together we stand!"
  wtt_china.1001.b: "We cannot trust them!"
  wtt_china.1002.t: "Communist China Agrees"
  wtt_china.1002.desc: "Communist China has sent the messenger back with a personal note, welcoming the invitation and promising to coordinate with our government."
  wtt_china.1002.a: "We will put our differences aside and work together."
  wtt_china.1003.t: "Communist China Refuses"
  wtt_china.1003.desc: "[From.GetLeader] has returned our note, claiming that the Central Government has no legal authority to replace a provincial governor. It was accompanied by a detailed report stating the combat-readiness of his troops."
  wtt_china.1003.a: "We will see about that."
  wtt_china.1004.t: "[From.GetLeader] Demands Unification"
  wtt_china.1004.desc: "As the Communists show their obedience to the central government, [From.GetLeader] feels safe to give them more territory, but definitely not from his own. [From.GetLeader] demands us to join the central government and transfer the northern part to the Communists. In return, we have been promised the rank of Field Marshal in the central army."
  wtt_china.1004.a: "There is no other option."
  wtt_china.1009.t: "Central Government Demands Unification"
  wtt_china.1009.desc: "The central government now believes that they are powerful enough to force us to join them, whether peacefully or through military actions. How shall we respond?"
  wtt_china.1009.a: "There is no other option."
  wtt_china.1009.b: "We need to negotiate the terms."
  wtt_china.1009.c: "We will never give in!"
  wtt_china.1010.t: "Chinese Election!"
  wtt_china.1010.desc: "Our first election is upon us! We need to vote for a leader who is strong, wise, and most importantly, with true Democratic sprit. Lin Sen has fought alongside Dr. Sun Yat-Sen, fit to lead a truely Democratic China. Zhang Xueliang is well-accepted by all parties, and he is eager to serve the country. Li Zongren has the full support of southern China, and he can help integrate the strong economy power in the South to build up our country quickly."
  wtt_china.1010.a: "Lin Sen is a true Democratic leader."
  wtt_china.1010.b: "Zhang Xueliang deserves a chance."
  wtt_china.1010.c: "Li Zongren is the right one."
  wtt_china.1032.t: "Invitation From [CHI.GetName]"
  wtt_china.1032.desc: "[CHI.GetName] invites us to join the [CHI.GetFactionName] faction."
  wtt_china.1032.a: "Sounds like a good idea!"
  wtt_china.1032.b: "They should mind their own business."
  wtt_china.1033.t: "[From.GetName] Accepts Our Invitation"
  wtt_china.1033.desc: "[From.GetName] accepts our invitation to join our faction."
  wtt_china.1033.a: "Wonderful!"
  wtt_china.1034.t: "[From.GetName] Rejects Our Invitation"
  wtt_china.1034.desc: "[From.GetName] rejects our invitation to join our faction."
  wtt_china.1034.a: "They will regret this day!"
  wtt_china.1035.t: "[CHI.GetName] Requests Revision of Singapore Strategy"
  wtt_china.1035.desc: "[CHI.GetName] Requests Revision of Singapore Strategy"
  wtt_china.1035.a: "Sounds reasonable."
  wtt_china.1035.b: "We must not trust them."
  wtt_china.1038.t: "Lin Sen Passes Away."
  wtt_china.1038.d: "Lin Sen was involved in a car crash earlier in the year, followed by a stroke. Since then, Lin Sen was placed in a hospice. Despite this, he continued to work and lead our nation. His health deteriorated quickly however, and on August 1st, he passed away at the age of 76. A month of mourning has been declared and Hu Shih has been elected the new leader of the party. Lin Sen served as Chairman of the National Government of China from 1931 until his death, making him the longest serving elected leader of China.\n\nHis replacement, Hu Shih, has served as China's ambassador to the United States between 1938 and 1942. He was recalled and has since been a leader in progressing Chinese Liberalism."
  wtt_china.1038.a: "Terrible news!"
  wtt_china.1042.d: "Our first election is upon us! We need to vote for a leader who is strong, wise, and most importantly, with true Democratic sprit. Lin Sen has fought alongside Dr. Sun Yat-Sen, fit to lead a truely Democratic China. Zhang Xueliang is well-accepted by all parties, and he is eager to serve the country. Zhang Lan, the leader of the Democratic League, has strongly advocated for a Constituional Monarchy in China since 1911, and he has a vision for our new China."
  wtt_china.1042.c: "Zhang Lan has been loyal."
  wtt_china.1043.t: "The Duke Yansheng"
  wtt_china.1043.d: "Kong Te-Cheng is a 77th generation descendant of Confucius. He was the final person to be appointed Duke Yansheng and the first Sacrificial Official to Confucius. On 6 June 1920, shortly after his birth, he was appointed Duke Yansheng by President Xu Shichang in accordance with an Imperial tradition dating back to 1055 of bestowing the title on the eldest male in each generation of the main line of descent. His father had died before Kong Te-Cheng's birth, making him the last person to be granted the centuries-old Dukedom when the title was abolished by the Nationalist Government in 1935 and replaced with that of a Ceremonial Official to Confucius.\n\nA believer in Democracy, when the Japanese approached Duke Yansheng to become a puppet Emperor of China, he responded with: 'I am a patriot, ready to take up arms and fight the Japanese'.\n\nThis is clearly a man who would be a strong Emperor and an Emperor who can build a truly Democratic China."
  wtt_china.1043.a: "Wonderful!"
  wtt_china.1044.t: "Marquis of Extended Grace"
  wtt_china.1044.d: "Zhu Yuxun, the last holder of the title Marquis of Extended Grace, was a prominent figure in early 20th-century China. He was known for his connections to the Qing Dynasty and for being part of the traditional aristocracy during a time of significant political upheaval in China.\n\nAfter 1933, Zhu Yuxun's fate became somewhat mysterious. Following the fall of the Qing Dynasty in 1911 and the subsequent political instability, Zhu faced challenges in maintaining his status and influence. Reports suggest that he may have fled to Shanghai to avoid political persecution during the rise of the Nationalist government and the increasing turmoil in China.\n\nThere are few concrete records of his activities after this time, leading to speculation about his eventual fate. However, definitive information about his life post-1933 remains scarce, and his disappearance has led to ongoing intrigue regarding the fate of the last Marquis of Extended Grace.\n\nDespite this, we have sent teams across the nation in an attempt to find the heir to the throne. After some time, he was indeed found on the outskirts of Shanghai. At first, he seemed distrustful, but as we proved our loyalty to the Ming Dynasty, he agreed to return to the Capital."
  wtt_china.1044.a: "The Ming shall rule China once more!"
  wtt_china.1045.t: "The Grand Council"
  wtt_china.1045.d: "In the Emperor's infinite wisdom, he has decided to create a 'Grand Council' to run the day-to-day affairs of the Empire. The council was originally in charge of military affairs, but gradually gained more and more power, eventually becoming a fully fledged privy council.\n\nEager to serve the country, Zhang Xueliang has been chosen by the Emperor to lead the Grand Council and by extension the country. Xueliang's first order of business is to end the Nine Power Treaty, a move that will not sit well with the western powers."
  wtt_china.1045.a: "Interesting."
  wtt_china.1046.t: "Socialists in Power?"
  wtt_china.1046.d: "Ever since we allowed the Communsists in the government, there has been a power struggle between the Democratic and Communist factions. However, with our recent decisions, the Democratic faction has started take more and more influence from the Communists. As a result, a coalition has formed between moderates from both sides, agreeing to put their differences aside and form a social democrat faction.\n\nThe question now remains, who should lead this new party? Our current President has shown that they are capable at leading our great nation. However, those on the left are still untrusting of him. The other option is Zhang Lan. While a socialist, he has always advocated for Democracy. Because of this, he could be the President to end the fued between the Communist and Democratic factions..."
  wtt_china.1046.a: "We don't need a new President..."
  wtt_china.1046.b: "Zhang Lan has been loyal."
