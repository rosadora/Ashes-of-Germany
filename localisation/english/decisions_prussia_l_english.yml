 MON_mongolian_great_purge_desc:0 "The purges in the Soviet Union have already spread to Mongolia in response to the Leftist Deviation of the late 1920s and the Lkhümbe Affair. But as tensions with Moscow rise, the worst may still be yet to come."
 MON_nkvd_crackdown:0 "Impending NKVD Coup"
 MON_nkvd_crackdown_desc:0 "Soviet patience is rapidly running out with our continued attampts to maintain our independence. The NKVD station chief in Ulaanbaatar is making their policy clear: if [MON.GetLeader] will not follow Soviet advice, they will find someone who will."
