 prussia.108.t:0 "Saxony Denies"
 prussia.108.d:0 ""
 prussia.108.a:0 "Nice."
 prussia.106.t:0 "Prussia suggests an alliance"
 prussia.106.d:0 ""
 prussia.106.a:0 "Say yes."
 prussia.106.b:0 "Say no."
