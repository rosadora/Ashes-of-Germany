 MAN_five_year_plan_cat:0 "The Five Year Plan"
 MAN_five_year_plan_cat_desc:0 "Manchuria hosts the third largest industrial base in Asia. But compared to Japan's our own industry is humble. Since our foundation the Japanese implemented a five year plan to develop our domestic industry."
 hoshinos_plan:0 "Hoshino's Plan"
 hoshinos_plan_desc:0 "The original plan was developed by Naoki Hoshino. Based upon the Soviet Five Years Plans, which focus on a quick industrialization, especially the heavy industry."
 MAN_five_years_plan_mis:0 "The Five Year Plan"
 MAN_five_years_plan_mis_desc:0 "While basic industry and infrastructure has been build already, this Plan focuses on expanding the administration and the economy in cooperation with state-owned companies."
 MAN_five_years_plan_mis_syndicalist:0 "Five Year Plan (syndicalist)"
 MAN_five_years_plan_mis_syndicalist_desc:0 "After the success of his industrialization Program, Hoshino developed a new Five Year Plan to build up a heavy industry based economy. The military will allocate contracts to single companies. These syndicalist elements will greatly increase our military production."
 MAN_five_years_plan_mis_state_focus:0 "Five Year Plan (state focused)"
 MAN_five_years_plan_mis_state_focus_desc:0 "Despite the success of Hoshino's industrialization program in his original Plan, Yoshisuke Aikawa proposed a more state focused Plan. The state will control the economy with state-owned companies. Which will greatly increase our civilian sector."
