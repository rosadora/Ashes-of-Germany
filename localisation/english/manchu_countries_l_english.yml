 MAN_kwantung_purge:0 "Administration Purged"
 MAN_kwantung_purge_desc:0 "The Reform of our state service had left many gaps in our administration. It will take time to refill them."
 MAN_great_manchuria_fc:0 "Proclaim Great Manchuria"
 MAN_great_manchuria_fc_desc:0 "We have now secured every territory in which historically Manchu settled and lived for ages. It was our land before the Russians invaded it and now it's ours once again! We can truly say that every Manchu is united under one Empire of Great Manchuria!"
