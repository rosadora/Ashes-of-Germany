 man_nkvd_infiltration:0 "NKVD has infiltrated Manchuria"
 SOV_pressure_manchu_gov:0 "Pressure Manchurian Government"
 SOV_pressure_manchu_gov_desc:0 "We'll use our Influence to keep Manchukuo in line."
 SOV_manchu_nkvd_infiltration:0 "NKVD Operation in Manchuria"
 SOV_manchu_nkvd_infiltration_desc:0 "There are still some Russians of the White Movement in Manchukuo along side with other traitors as well. The NKVD will launch an operation to hunt down these criminals."
 SOV_support_dongbei_partisans:0 "Support the Dongbei Army"
 SOV_support_dongbei_partisans_desc:0 "They might not be hunted down by the Japanese any more, but they're far away from overthrowing the government. We should support our communist allies."
