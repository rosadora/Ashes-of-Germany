 MAN_anti_japanese_war:0 "Anti-Japanese War"
 MAN_anti_japanese_war_desc:0 "There is no hope, only our Will. The Japanese are no longer the ruling force in our country. We will be free from their yoke and nobody will suppress us any more."
 MAN_south_manchuria_railway_company_controlled:0 "South Manchuria Railway Company"
 MAN_railway_control_tt:0 "With the full control over the §CSouth Manchurian Railway§W, we can improve our §GInfluence§W and §GAutonomy§W \n"
 MAN_asking_support:0 " Asking for support from another Country"
 MAN_foreign_support_tt:0 "With enough §CForeign Support§W we may gain Independence §Gwithout war§W \n"
 man_foreign_support.1.t:0 "Manchukuo seeks Support for Independence"
 man_foreign_support.1.desc:0 "The Government Manchukuo has informed us by secret channels. That they want to be free from Japanese yoke and they seek our support. The North-East are de jure our territories, but the Japanese invaded it few years ago after the Mukden Incident. Even if we can't get it under our control this might be the only chance to regain Chinese territory from Japan."
 man_foreign_support.1.demand:0 "They must support us vice versa."
 man_foreign_support.2.t:0 "Manchukuo seeks Support for Independence"
 man_foreign_support.2.desc:0 "A few years ago following the events of the Mukden Incident the Japanese invaded Manchuria. Until the Russo-Japanese War in 1905 Manchuria was under Russian influence. China is still in a civil war and is more of an opportunity than a threat. But the Japanese however now threatening Vladivostok and the far East. Manchukuo, initially created as a puppet state, now has contacted us. In a secret meeting in Mazhouli we discussed their plans to become independent from Japanese yoke and they asked us for intervention should Japan not accept their demands. We could regain our influence over Manchuria back, but also risk a war with Japan. During this uncertain time, especially with the political situation in Europe, this could bring us in a precarious position."
 man_foreign_support.2.demand:0 "Only with access to their resources."
 man_foreign_support.3.t:0 "Manchukuo seek Support for Independence"
 man_foreign_support.3.desc:0 "After the Mukden Incident Japanese troops introduced themself in the former North-East territory of China. The Lytton-Commision should have cleared the question of the responsibility of the incident, but it didn't come to a satisfactory answer. Following the events of Japanese Invasion, Manchukuo declared it's independence. But according to the Stimson Doctrine which forbids the recognition of every country formed through military actions the United States Government sees Manchuria as a de jure part of China and not as an independent country. Now this unrecognized country contacted the USA for help to secure true independence. It's true Manchuria is part of China but under Japanese occupation, but if they really want to be independent we can't ignore their request. This means we would also abandon our position in the last years."
 man_foreign_support.3.demand:0 "If it's the will of the Manchu people we might support them."
 man_foreign_support.4.t:0 "China Supports Us"
 man_foreign_support.4.desc:0 "The Republic of China in spite of the ongoing civil war is willing to help us."
 man_foreign_support.5.t:0 "China Offers Mutual Support"
 man_foreign_support.5.desc:0 "Chiang Kai-Shek has offered his support to get independence. According to his message 'Chinese People must stay together against all means'. However he demands us to support him vice versa in the ongoing civil war against the communist menace and other warlords."
 man_foreign_support.5.a:0 "One China. We'll fight together."
 man_foreign_support.6.t:0 "The Soviet Union Supports Us"
 man_foreign_support.6.desc:0 "During our secret meeting in Manzhouli the Soviet Union has offer their help to reduce Japanese influence in our region. Surprisingly they seem to not make any demands on us for the help we requested."
 man_foreign_support.7.t:0 "Soviets Ask For Exclusive Resource Rights"
 man_foreign_support.7.desc:0 "During our secret meeting in Mazhouli the Soviets seem to agree to help us in our path for independence. However they also ask to sign a trade agreement which will give them exclusive rights to our resources, especially our coal. This deal will surely secure their support, but it could also be that we exchange the Shinigami with a devil."
 man_foreign_support.7.a:0 "Let's drink with our new Soviet friends."
 man_foreign_support.8.t:0 "USA Recognized Manchukuo"
 man_foreign_support.8.desc:0 "The News waved all over the world that the United States of America recognized Manchukuo as an independent country. Usually recognition of other countries especially smaller ones like ours are not a big deal. However the USA had vehemently refused our independence and stands for the position that our country is still part of China according to the Stimson Doctrine. Now they seem to have changed they position. In their official declaration they said that Manchukuo is an independent country from China, but also from Japan. A clear quote against Japanese imperialism."
 man_foreign_support.9.t:0 "USA Uncertain About Our Intention"
 man_foreign_support.9.desc:0 "Our secret discussion with the US negotiator are ongoing, but the USA still don't see any reason for support or even recognition of our nation. They hold the position that we are rightfully part of China and not an independent country. But they also informed us that if we can guarantee that the independence is the will of the manchu people, then they will support us."
 man_foreign_support.9.a:0 "The lack of democracy was the failure of our last Empire, we won't repeat it."
 man_foreign_support.10.t:0 "Foreign Power don't Support us"
 man_foreign_support.10.desc:0 "Despite of our good arguments, our petition was rejected. We can't convince this great power to support our independence. There is still hope that maybe others will support us... or at least we are strong enough to take on the Japanese ourselves."
 man_foreign_support.11.t:0 "USA Requests a Proof For the Will of The People"
 man_foreign_support.11.desc:0 "The USA supported us under the condition that we will fulfil the will of the people. If we are to proof that our announcement to become more democratic, then we must accept to spread democracy in our country. But do we really want to risk our country to get destabilized by potentially dangerous ideas?"
 man_foreign_support.11.a:0 "A bit democracy will hurt nobody, right?!"
 man_foreign_support.12.t:0 "China Calls us to Act"
 man_foreign_support.12.desc:0 "Now the civil war is going to the next phase. The Republic of China has called us to support them in their fight against the Communist. The Communist are also our enemies and we have promised to help the Republic even thou they overthrow our Emperor before. But is this war really worth it to pick sides, when the outcome isn't clear?"
 man_foreign_support.12.a:0 "We'll crush the communist together."
 man_foreign_support.yes:0 "It's more as we could hope for."
 man_foreign_support.no:0 "Disappointing."
 man_foreign_support.support:0 "Let's support them."
 man_foreign_support.refuse:0 "It's not worth it."
 man_foreign_support.reject:0 "Reject these requests."
 wtt_manchukou.101.t:0 "Manchukuo's Declaration of Independence"
 wtt_manchukou.101.desc:0 "After an accident with an officer of the Kwantung Army, the Empire of Manchukuo has expelled them off the country. Emperor Puyi announced that Manchukuo is a sovereign country, fitting for respect."
 wtt_manchukou.101.a:0 "For the moment we must accept this."
 wtt_manchukou.101.b:0 "We must punish this disrespect."
 wtt_manchukou.110.t:0 "Protection of the Amur"
 wtt_manchukou.110.desc:0 "With the ongoing events in Europe the Soviet Union is in real danger. After Manchukuo got freed they extradited traitors of the White Movement and our relations grew with benefits for both of us. They even gave us the North Manchurian Railway back. Manchukuo is aware of our precarious situation. It would be the perfect time for Japan to attack us. So the foreign minister of Manchukuo offered us personally to protect the far-East including the major port of Vladivostok. It would be temporary of course, but they can still betray us and side with the Japanese. On the other Side to be safe in the East we can completely focus on the Western front."
 wtt_manchukou.110.a:0 "Accept their offer."
 wtt_manchukou.110.b:0 "We will never lend the land."
 wtt_manchukou.111.t:0 "Return the Far-East"
 wtt_manchukou.111.desc:0 "The Victory over Germany is close and the Soviets remember our agreement to return their far-Eastern territories we had protected until now. We signed a treaty and refusing it will have dire consequences, but also this is Manchurian territory and the Soviets are not deserving it at all."
 wtt_manchukou.111.a:0 "We promised it - We protected. Return their territories."
 wtt_manchukou.111.b:0 "They should take these territories from our dead bodies."
 wtt_manchukou.112.t:0 "Soviets accept"
 wtt_manchukou.112.desc:0 "The Soviet Union has accepted our offer to protect the far-East until they pushed the invaders out. But to proof out trustworthiness we gave them back the control of the North Manchurian Railway and also granted the permission to build bases in our land."
 wtt_manchukou.112.a:0 "Finally."
 wtt_manchukou.113.t:0 "Soviets Refuse"
 wtt_manchukou.113.desc:0 "Despite our good arguments the Soviets don't see any reason to give land even if it is temporary."
 wtt_manchukou.113.a:0 "Unfortunate."
 wtt_manchukou.120.t:0 "Demands from Manchuria"
 wtt_manchukou.120.desc:0 "After we withdraw peacefully as always from Manchukuo our relations are terrible. Now Manchukuo send us an open letter in which they wrote their demands to 'normalize' the relations with us. They really think we should overhand them Hebei and withdraw from Mengkukuo and Korea. But the most impolite demand is that we should respect them. We could teach them a lesson or at least reject their thanklessness. But on the other hand we could also accept it. Maybe if we normalize our relation we can gain new ally."
 wtt_manchukou.120.a:0 "Let's normalize our relationship."
 wtt_manchukou.120.b:0 "They should pay us respect like a child do to his parents for everything we did for them."
 wtt_manchukou.122.t:0 "Japan Bows to Our Demands"
 wtt_manchukou.122.desc:0 "Japan has accepted our Demands and withdraw from our borders. Only Kanto-Shu is still under their control, but this will change soon enough."
 wtt_manchukou.122.a:0 "They should respect us."
 wtt_manchukou.123.t:0 "Japan offended"
 wtt_manchukou.123.desc:0 "Japanese officials are irritated about our humble demands. The Ambassador informed us we should be thankful to be independent and took hours to explain why we should still be even more thankful to Japan for all they have done for us."
 wtt_manchukou.123.a:0 "Then we will make sure they will respect us."
 wtt_manchukou.130.t:0 "Japanese Investment Plan"
 wtt_manchukou.130.desc:0 "After Manchukuo's Independence the land was in large part rural and our own industry humble. The Japanese helped us to build up our industry. To make this quicker they develop a five-year plan. The original Plan which contains syndicalist elements was developed by Naoki Hoshino, who thought that the military should allocate monopolized contracts to several companies. This Plan would highly increase our heavy industry but ignore our civilian needs. On the other hand the current chairman of Mangyo Yoshisuke Aikawa said that our market is not strong enough to host this economic system and proposed a more state controlled economy."
 wtt_manchukou.130.a:0 "Support the new state-focused changes of Yoshisuke Aikawa."
 wtt_manchukou.130.b:0 "Let's keep the original syndicalist plan of Naoki Hoshino."
 wtt_manchukou.140.t:0 "True Panasianism"
 wtt_manchukou.140.desc:0 "Without the toxic influence of the Kwantung Army, our political culture is blooming. Japan has guided us and has built-up our country. The people now see that Panasianism is real. Nobody will question our deep equal relationship any longer."
 wtt_manchukou.140.a:0 "Asia for Asians"
 wtt_manchukou.150.t:0 "Socialist Topple our Government"
 wtt_manchukou.150.desc:0 "With growing Soviet Influence this was inevitable. Supported by the Soviet Union the Dongbei Partisans took over several Police Stations in major cities and left-wing minded politicians called in the Legislative Council for an emergency session. Which they used to topple the government forming a new socialist Republic."
 wtt_manchukou.150.a:0 "The Future shall shine brightly under the Red Sun!"
 wtt_manchukou.151.t:0 "The First Baili Meeting"
 wtt_manchukou.151.desc:0 "After the Sovietunion gained control over the railway, they contacted the Dongbei Communists and recommended the unifaction of the three Party Comitees in the Northeast. Feng Zhongyun travelled to Khabarovsk (in chinese Baili) to discuss this topic with Zhao Shangzhi, who recently retreated back to the Sovietunion after a wearing battle against Manchurian Troops. Zhou Baozhong also arrived as representive for the Jidong Provisional Provincial Party Comitee. It was decided to unify the party comitees under the military leadership of the Dongbei-Army. However the Topic changed later around Zhao Shangzhi, after it came out he had killed his subordinate Qi Zhizhong. This lead to heated heart to heart talk between Feng Zhongyun, Zhou Baozhong and Zhao Shangzhi. While Feng Zhongyun initiated an investigation as secretary of the North Manchurian Provisional Provincial Party Comitee, which he and Zhao belongs to. At the end Zhao Shangzhi committed selfcritisim and was expelled from the Party for constant disobedience for an uncertain time. However he remain in charge as commander due to his skill and experience."
 wtt_manchukou.151.a:0 "What a disgrace"
 wtt_manchukou.152.t:0 "The Khabarovsk Party Commitee"
 wtt_manchukou.152.desc:0 "While the Communist Partisans are growing stronger in Manchuria, they still don't have constant contact with the Yan'an HQ of the CCP. In Khabarovsk the leaders of the Dongbei Partisans recently met and decided, that until they can establish contact with rest of the CCP, the Party Commitee of the CPSU in Khabarovsk will lead them instead. During the meeting they also shunned Zhao Shangzhi a skilled Partisan for his disobedience. Other might say he's just using an unorthodox approach to fight the japanese, but is clear that he has his own vision of how orders are to be interpreted. We could rehabilitate him for his succesful strategies and increase our Influence. On the other hand we could also send the Delegate of the CCP back to Manchuria and reesteblish a new party HQ there. As the current CCP Politburo seems not to follow the international line of Communism."
 wtt_manchukou.152.a:0 "Leave it be"
 wtt_manchukou.152.b:0 "Rehabilitate him"
 wtt_manchukou.152.c:0 "Send the Delegate instead"
 wtt_manchukou.152.d:0 "Send devoted Trotzkists instead"
 wtt_manchukou.153.t:0 "Soviets rehabilitate Zhao Shangzhi"
 wtt_manchukou.153.desc:0 "After we decided to temporarily expell Zhao Shangzhi from the Party, the Sovietunion adviced us to rehabilitate him. This would not only legitimice his actions in the past, but also criticise our decision against him. Neither the Yan'an HQ nor we've the choice to disobey their request and must follow this decision. What ever the reasons are, it is clear the Soviets want to keep us on a short leash."
 wtt_manchukou.153.a:0 "We'll follow this advice"
 wtt_manchukou.154.t:0 "Wang Ming returns"
 wtt_manchukou.154.desc:0 "After our Meeting in Baili, the Soviets ordered for Wang Ming his return from the Comintern back to China. While his skill in organizing the Party will be useful. It is clear the Soviets want to ensure that, we follow their advices. Wang Ming is loyal to the Comintern and will follow their orders without any question. What ever the reasons are, it is clear the Soviets want to keep us on a short leash."
 wtt_manchukou.154.a:0 "Welcome back, Comrade"
 wtt_manchukou.155.t:0 "The Second Baili Meeting"
 wtt_manchukou.155.desc:0 "With our recent success in securing the Northeast it's time to reorganize the Party. While we finally unified the Party comitees from all three Provinces and centralized the military command. There is still an open question: Who will lead us in our final struggle against the Nationalist.\n\nWe could keep Yang Jingyu, a profen commander with an unbreaking Will and loyal to the cause. He will secure that we remain as close to the Party Line promoted by the Yan'an Hq as possible.\nAnother possible Candidate is Zhou Baozhong as skilled as a commander as he is as a politician officer. Generalspeaking he's calm and prefers more moderate approach in politics. He stands for reconcillation with the Party Comitees and Zhao Shangzhi on the other.\nSpeaking of him Zhao Shangzhi is also not an unlikely Candidate. While he remains partially expelled from the Party, his chance are not so bad. First he was criticised for his leftist tendecies of supporting radical land reforms, later for his rightist tendecies in cooperating with Nationalists to fight the Japanese. Zhao Shangzhi will probably be an ambigious choice however.\nAt last we should consider our strong relations and reliance to the Sovietunion, if we appoint a leader. What ever choice we make it will also effect their goals dealing with us."
 wtt_manchukou.155.a:0 "Yang Jingyu the Leader of the Dongbei-Army"
 wtt_manchukou.155.b:0 "Zhou Baozhong and his moderate approach will guide us"
 wtt_manchukou.155.c:0 "Zhao Shangzhi and his staunch anti-imperialistic line"
 wtt_manchukou.155.d:0 "Wang Ming will bring us closer to the Soviet Union"
 wtt_manchukou.156.t:0 "The Dongbei Base"
 wtt_manchukou.156.desc:0 "The Northeast of China was always a strategically valuable position. Well protected against counter attacks it could be the perfect base to win the Chinese Civil War for the communist cause. But there are suggestions, that we might keep control over Manchuria. It's large power base could protect us against other threats as well. If we declare Manchuria it's own State, it could remain in our sphere of influence, but this will hurt our relations with the Chinese Warlords and maybe end in loss for Communism in China."
 wtt_manchukou.156.a:0 "Let them reunite with the CCP"
 wtt_manchukou.156.b:0 "They'll become a Soviet Republic!"
 wtt_manchukou.156.c:0 "Declare an independent Manchuria!"
 wtt_manchukou.157.t:0 "The Soviets support Chinese Reunification"
 wtt_manchukou.157.desc:0 "As expected the Soviet Union supported our rightful cause in the struggle against the Nationalists and finally reunify the country. We will need however to establish durable communications and reconcile with Yan'an HQ."
 wtt_manchukou.157.a:0 "One China shall shine brightly under the Red Sun!"
 wtt_manchukou.158.t:0 "Red Sun over Manchuria..."
 wtt_manchukou.158.desc:0 "Instead of supporting our wish to reunify with the Yan'an HQ and joining their struggle against the Nationalists as indivisible part of China; they forced us to establish a Manchurian Soviet Republic. We'll basically become a satellite state in Soviets Sphere of Influence, with the possibility to integrated in the Soviet Union completely. However if the Chinese Communist fail in the heartland there will be at least one Communist State on Chinese soil."
 wtt_manchukou.158.a:0 "We'll stick with it!"
 wtt_manchukou.159.t:0 "The Soviet Union Reduce Their Influence Over Manchuria"
 wtt_manchukou.159.desc:0 "Surprisingly the Soviet Union has decided to reduce their Influence over Manchuria. They even returned the railways back to our command. According to their official statement in the Khabarovsk Party Comitee, their mission to rebuild and secure the Northeast for Communist cause is over, they will however still guide us in case of need. While some call this fortune for us and are thankful to the Soviets for this action as a good example of international workers cooperation, other might say that the Soviets just want to reduce the amount of resources given to us and use them for themself. Whatever might be true, we can now decide our own path to communism."
 wtt_manchukou.159.a:0 "Finally, it is ours to decide!"
 wtt_manchukou.160.t:0 "Soviets give some 'Advices'"
 wtt_manchukou.160.desc:0 "The Soviet Union is holding a strong Influence over our economy, and by extent, over our Government as well. Now they seem to use this Influence to enforce some personal changes in our administration. Their Influence is not quite as strong as the Japanese before and we could just simply rejecting their demands. However this will still have some consequences..."
 wtt_manchukou.160.a:0 "Arrange a compromise"
 wtt_manchukou.160.b:0 "We have to accept this"
 wtt_manchukou.160.c:0 "Politely decline"
 wtt_manchukou.161.t:0 "The Soviet Union increases their investment"
 wtt_manchukou.161.desc:0 "We were informed, that the Soviet Union want to give us further industrial support and their increasing their budget. Part of this is an extend of existing resource production capacity, but also they are investing more in the heavy industrial branch. While this economic support is welcomed, their increasing influence is not."
 wtt_manchukou.161.a:0 "Thanks for help, Comrade... I guess..."
 wtt_manchukou.162.t:0 "Soviet factories are built"
 wtt_manchukou.162.desc:0 "The latest economic investment plan from the Soviet Union is nearly finishing. While new factories open up for work and we become more and more self-sufficient, there is a noticeable increase of Soviet control over our economy."
 wtt_manchukou.162.a:0 "For the People!"
 wtt_manchukou.162.b:0 "For the Workers!"
 wtt_manchukou.163.t:0 "Reunify with the Communist Party of China"
 wtt_manchukou.163.desc:0 "During our Partisan fight we're cut off from communications to the Base in Yan'an. But we achieved victory in the North-East. Now we still have no durable connections to the Party Leadership. The Base in Yan'an might even fall. Nevertheless we have to make a land connection to them by conquering the North and secure Beijing on the way. But there are some who think, that the Base in Yan'an was set up by traitors anyway and we should abandon them and bring a more pro-Soviet style of Communism to China by ourself."
 wtt_manchukou.163.a:0 "Let's join our fellow Comrades in the final struggle for China!"
 wtt_manchukou.163.b:0 "We declare ourself as the only legitimate Government of China, the Yan'an HQ are Traitors anyway!"
 wtt_manchukou.163.c:0 "Yan'an has fallen, but we'll retake the Fire of Revolution!"
 wtt_manchukou.164.t:0 "Soviets send a Trotzkist Delegation"
 wtt_manchukou.164.desc:0 "With our latest victory in the Northeast, the Soviet Union decided to send us a delegation. With the Leftists in charge they will want to bring us closer to the Fourth International and increaser their Influence over our Party; so they choosed Peng Shizhu as the leader of the delegation./nAS one of the earliest members of the CCP, he was later on expelled due to his leftist views and sympathy with trotzkis internationalism along side Chen Duxiu. Now with the recent political changes in the Soviet Union, their new Leader picked him over Chen."
 
 MAN_soviet_favor_actions:0 "Soviet Influence in Manchuria"
 MAN_soviet_favor_actions_desc:0 "The Soviet Union is very pleased for the return of some traitors. Soviet officials have informed us, that if we need assistance in regards to our industrial development and army expansion, they will gladly aid us. They are willing to help us building up our economy, training of capable officers, and transportation of military hardware. But with the upcoming war in Europe we might gain greater benefits from them if we help them out.\n\n Our current §5Favor§W is: [SOV.GetFlag] [?MAN.man_soviet_favor|0H]\n\n Current risk for a socialist uprising is: [MAN.MAN_socialist_coup_risk]"
 MAN_send_weapons_soviet:0 "Send Guns to the USSR"
 MAN_hand_over_north_railway:0 "Return the North Manchurian Railway"
 MAN_hand_over_north_railway_desc:0 "The North Manchurian Railway was once under Russian control as part of the Trans-Baikal railways. If we return the control to the Soviet Union they would be very thankful. Maybe we could ask them for an even greater favor."
 MAN_request_army_training:0 "Request support by our Army training"
 MAN_request_army_training_desc:0 "After we get rid off the Japanese advisors our army still lacks in good officers. The Soviet Union has agreed to help us train new cadets."
 MAN_request_industrial_support:0 "Request support to build up our Industry"
 MAN_request_industrial_support_desc:0 "We don't have the industry to produce enough machines by ourself, but we can ask the Soviets instead. They can offer us some machine tools. We must still build up the factories ourselves."
 #MAN_protect_the_amur:0 "Protect the Amur"
 #MAN_protect_the_amur_desc:0 "During the Russian Civil War the Far-East was vulnerable to Japanese aggression. The Soviets released the Far-East as a neutral puppet state to prevent a Japanese invasion. Now with the ongoing events in Europe the Soviet Union might not have the time to deal with the Japanese. We could ask them to protect the Amur region in order to prevent a Japanese surprise attack. \n\n This will cost us [SOV.GetFlag] §Y50§! Soviet Favors"
 MAN_demonstrated_legitimacy:0 "Demonstrate Legitimacy"
 MAN_demonstrated_legitimacy_desc:0 "Japan recognizes us as a partner. Our Emperors are like brothers and so are our nations. We pay only the respect that a younger would pay to his elder. But not everyone sees it that way. We must demonstrate our legitimacy. It will require a great deal of political effort but it's worth it."
