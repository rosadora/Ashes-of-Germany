 MAN_imperial_restauration:0 "Imperial Restauration"
 MAN_imperial_restauration_desc:0 "Deposed by the Xinhai Revolution but not defeated. The Qing groom from the Northeast as an impeding menace to reclaim what is their right given by the heaven."
 aikawa_plan_tt:0 "Aikawas §OState-focused Plan§W will favor our §Gcivilian§W industry and factorie §Goutput§W, but our economy §Rgrowth decrease§W slightly."
