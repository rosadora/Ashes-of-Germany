 MAN_socialist_victory:0 "Socialist Victory"
 MAN_socialist_victory_desc:0 "Finally Comrades, we have achieved the greatest Victory! Not only over the Japanese imperialists, but over fascism itself. The reactionary Manchurian Government has fallen and now the Workers truly rule these lands."
 MAN_manchurian_socialism:0 "Manchurian Socialism"
 MAN_manchurian_socialism_desc:0 "The Kwantung Army has exploited our Land even worse then the Warlords before. Manchuria needs a new way for the People. A socialism based on the needs of the common peasantry and the growing working class."
 MAN_communist_in_charge:0 "Communist in Charge"
 MAN_communist_in_charge_desc:0 "The Communist Party is the only true representation of the People. The Northeast can become the Base where we can liberate the rest of China from foreign imperialists and reactionary fascists. But first we must secure our new position."
 MAN_rural_development_program:0 "Rural Development Program"
 MAN_rural_development_program_desc:0 "Manchuria is despite it's large industrial base still mostly rural and highly depends on their agriculture sector. But we can improve daily life conditions of the peasantry quite easily by building wells, investing in roads, and clean up some new lands. This will not only improve the economy, but make us look as the only legitimate government in the eyes of people."
 MAN_agrarian_reform:0 "Agrarian Reform"
 MAN_agrarian_reform_desc:0 "The Japanese have tried to implemented some land reforms, but these attempts where usually stopped by the Kwantung Army in fear a success could lead to a major land reforms in Japan as well. We can continue the work of the exiles Japanese leftist, or we could implement a more collectivized approach like in the Soviet Union."
 MAN_peoples_revolutionary_commitee:0 "Peoples Revolutionary Committee"
 MAN_peoples_revolutionary_commitee_desc:0 "Now with the full control over Manchuria, we can reorganize the Manchurian Provisional Provincial Party Committee. The new found Peoples Revolutionary Committee will act as Party Headquarter for the entire Northeast, as it will be the assembly."
 #MAN_peoples_revolutionary_commitee_trotzkism:0 "Peoples Revolutionary Commitee"
 #MAN_peoples_revolutionary_commitee_stalinism:0 "Peoples Revolutionary Commitee"
 MAN_bastion_of_trotzkism:0 "Bastion of Trotzkism"
 MAN_bastion_of_trotzkism_desc:0 "While the theoretical works of disgraced Trotzki may be banned and his supporters expelled from other Communist Parties in most of the World, but we will follow his line. We will build an utopia of true communism. And will protect the World Revolution."
 MAN_revolutionary_military_commision:0 "Revolutionary Military Commission"
 MAN_revolutionary_military_commision_desc:0 "Now with the political reorganisation, it's time for the army. We will reorganize our commandstructure and also use this opportunity to purge some members, who fell of the line."
 MAN_central_economic_planning_comitee:0 "Central Planning Committee"
 MAN_central_economic_planning_comitee_desc:0 "While Manchukuo already has a planned economy, the actual control over it layed in the hands of the Kwantung Army and Mangyo. Without them any more we need to create a new body to lead our economy."
 MAN_peasant_trade_union:0 "Peasant Trade Union"
 MAN_peasant_trade_union_desc:0 "Proposed by Japanese Communist and influenced on Bukharins theoretical works, we could unify the Paesantry like the Workers in a single trade union. This will protect them not only from greedy landlords, but also increase their cooperation with each other in case of need. We will also gain better control on their production, too."
 MAN_syndicalist_planned_economy:0 "Syndicalist Planned Economy"
 MAN_syndicalist_planned_economy_desc:0 "Hoshino Naoki originally intended to implement a syndicalist economy in Manchukuo. But his thoughts were never implemented to full extend. While it remains some drawbacks, like the military will allocate contracts instead of the government or trade unions, we could use his works and implement a truly syndicalist economy. With the current industrial base, our economy should be strong enough now to gain benefits from it."
 MAN_democratization_of_the_army_leadership:0 "Democratization of the Army"
 MAN_democratization_of_the_army_leadership_desc:0 "While we give the fate of our economy in the hands of the Worker, why we shouldn't we give this to our soldiers as well? We will form soldier councils and let them choose, who should lead them."
 MAN_new_workforce_regulations:0 "New Workforce Regulations"
 MAN_new_workforce_regulations_desc:0 "The Japanese exploited the Land and the working People as much as possible. We need to remove their inhuman labour laws and implement complete new ones instead. Our new Regulations will protect the common Workers from any exploitation at all and give them a proper payment and safe working conditions."
 MAN_scientific_socialism:0 "Scientific Socialism"
 MAN_scientific_socialism_desc:0 "Socialism is based on the scientific analysis of Karl Marx and others and it's proven to be the only correct way to govern society. And so should society governed only with scientific methods. With a greater focus on Science itself, our people will be more rational and so our government."
 MAN_dongbei_base:0 "The Dongbei Base"
 MAN_dongbei_base_desc:0 "The Northeast belongs rightfully to China. However it's geographic importance makes it into a playball in the Hands of foreign powers. It could become the power base we need to achieve victory of communism in China, or will become just another figure in the the game of Great Powers. We might not have the decision."
 #MAN_dongbei_base_keep_that:0 "While the Japanese claimed that Manchukuo was an independent state, it was a mere puppet under their iron grip. Neither selfproclaimed Chinese Government renounced their rightfully claim over the Northeast. The geostrategic importance was proven by the Fengtian Clique, who prevailed in this area until the japanese invaded their powerbase. A return to China as it rightfully belongs to is the dream of the Chinese guerilla since the creation of Manchukuo. But we are not as independent as we wish so and many powerful factions have their own interests in the Northeast. It could become the base to secure a communist victory in China, or just another playball in the hands foreigners."
 MAN_rejoin_ccp:0 "Rejoin with Chinese Communists"
 MAN_rejoin_ccp_desc:0 "It is time, the Northeast will finally return to China. Once and for all it will never be separated again. But now we still have to fight the Nationalists. Their will be only One China once and for all."
 MAN_manchurian_soviet_republic:0 "Manchurian Soviet Republic"
 MAN_manchurian_soviet_republic_desc:0 "No matter what might come to be, but our near future lays in the Soviet Union. We shall follow their example and build Soviet Republic in Manchuria; so we become a beacon of Socialism in Asia."
 MAN_international_solidarity:0 "International Solidarity"
 MAN_international_solidarity_desc:0 "Our success in Manchuria was only possible thanks to international support. It is our only duty to aid the World Revolution."
 man_gov_overthrown_by_right:0 "Manchurian Government is overthrown by Socialists"
 man_gov_overthrown_by_centre:0 "Manchurian Government is overthrown by Stalinists"
 man_gov_overthrown_by_left:0 "Manchurian Government is overthrown by Trotzkists"
 man_soviet_support_ccp:0 "The Soviet Union supports the Chinese Communists"
 man_soviet_republic:0 "The Sovietunion supports a Manchurian Soviet Republic"
 man_soviet_independence:0 "The Soviet Union grants us full independence"
 MAN_collective_farms_communist:0 "Full-Scale Collectivization"
 MAN_collective_farms_communist_desc:0 "The Collectivization Process initiated by the Japanese was enforced only over Chinese peasants with the goal to suppress them, while Japanese landlords still exploited the land. We will begin a new collectivization by all means and without any exception similar to the Soviet Union. Only this will guarantee benefit for the common peasant and ensure prosperity."
 MAN_collective_army_leadership:0 "Collective Army Leadership"
 MAN_collective_army_leadership_desc:0 "Instead of a strict command structure the Leadership will be elected by soldier councils. The common soldier knows at best how to fight and so he should decide who will lead them."
 MAN_revolutionary_military_commision_purge_tt:0 "Japanese §YCollaborist§W and §YReactionary§W will be §Rpurged§W and therefore no longer avaible as political advisors and Leaders."
 MAN_restore_legitimacy_socialism:0 "Restore Legitimacy"
 MAN_appoint_socialist:0 "Appoint Socialist into the Government"
 MAN_redirect_production:0 "Support Soviet Production"
 MAN_distract_nkvd:0 "Distract NKVD Agents"
 MAN_arrest_dongbei_partisans:0 "Arrest Dongbei Partisans"
 SOV_spread_propaganda_in_manchuria:0 "Spread Communist Propaganda"
 SOV_manchu_industrial_aid:0 "Increase Investment Budget"
 SOV_manchu_industrial_aid_desc:0 "We can increase our economic control over Manchuria by investing in their economy. We'll build new factories, but keep the control over them. So their Government relays to staying on good terms with us."
 SOV_manchu_influence:0 "Influence over Manchuria"
 SOV_manchu_influence_desc:0 "With their success becoming independent from the Japanese, Manchuria offers new opportunities for us. While we might have the strength to subjugate them, a different approach may be more beneficial. The Manchurian Government was wise enough to resell the North Manchurian Railway back to us. We can use our new gained influence and support the Chinese Communist in their cause. \n\n Their current §5Favor§W is: [MAN.GetFlag] [?MAN.man_soviet_favor|0H]\n\n Current likelihood of a socialist uprising is: [MAN.MAN_socialist_coup_risk]"
 MAN_soviet_railway:0 "Soviet Influence"
 MAN_soviet_railway_desc:0 "With Control over the northern railways, the soviet expertise in industrial concerns is welcomed, their influence isn't. If the Soviet Influence grows stronger it won't only effect our revenue, they will spread possible dangerous ideas. We have to deal with it, by either combat their influence, or embracing it."
 
 
