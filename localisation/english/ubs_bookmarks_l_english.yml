 MON_GATHERING_STORM_DESC: "After eight years of independence from the Qing Empire, Mongolia again fell under Chinese occupation in 1919. A period of strife followed, with Chinese, Soviet and White Russian forces vying for control, out of which a Soviet-backed revolution ultimately emerged victorious. \n\nHowever, relations with Moscow have not been smooth. The Soviets are becoming increasingly impatient with Mongolian progress towards Communism, and particularly with the status of the Buddhist clergy. Trapped between two giants, Mongolia faces a struggle to achieve lasting independence."
