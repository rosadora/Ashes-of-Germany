### Khalkhin Gol
 MON_khalkhin_gol:1 "Cross the Khalkhin Gol"
 MON_khalkhin_gol_desc:1 "[JAP.GetAdjectiveCap] expansion in continental east Asia has progressed at a worrying pace. They have even gone as far as to stake a claim to a small part of our territory on behalf of their puppet state, [MAN.GetName]. They are likely to view our entering the disputed are as a provocation. This provides us an with opportunity for us to test their resolve."
 MON_border_conflict_warning_MAN:0 "Border Provocation at [MON.GetAdjective] Border"
 #JAP_border_conflict_warning_SOV_desc:0 "There has been a clash between our border guards and Japanese soldiers at our shared border in Korea. Intelligence sources in Japan report that this may just be the first step in a larger confrontation. We should reinforce the border with Japan immediately."
 #JAP_border_conflict_escalation_warning_SOV:0 "Japanese preparations"
 #JAP_border_conflict_escalation_warning_SOV_desc:0 "Aerial recon has confirmed major troop movements at the Japanese side of the border. We don't know if or when the Japanese have decided to strike, but we must be ready."
 MON_border_incident_forgotten:0 "Window of Opportunity"
 #JAP_border_incident_forgotten_desc:1 "If we want to use the the incident at the Soviet border to Korea, we must strike quickly."
 MON_escalate_incident_to_border_conflict_MAN:0 "Escalate the Incident"
 MON_escalate_incident_to_border_conflict_MAN_desc:0 "It appears that the Manchurians are not backing down from the conflict. At this point, we must either escalate to an armed confrontation or back down ourselves."
 MON_border_conflict_time_until_cancelled:0 "End the Conflict"
 MON_border_conflict_time_until_cancelled_desc:0 "At the current rate, we can only sustain combat operations for so long before we need to break off combat."
 MON_border_conflict_escalate_conflict:0 "Escalate the Conflict"
 MON_border_conflict_escalate_conflict_desc:1 "The conflict at the border with [FROM.GetNameDef] has stalled. Perhaps by escalating further and commiting more troops to the theater, we can still achieve a victory."
 MON_border_conflict_escalate_to_war:0 "Declare War"
 MON_border_conflict_escalate_to_war_desc:0 "Fighting in the disputed region has been going on for a while now, and shows no sign of stopping. We must be prepared to take the next step and see this conflict as the first step in a general war."
 MON_border_conflict_back_out_of_conflict:0 "Back Down"
 MON_border_conflict_back_out_of_conflict_desc:0 "The danger of this conflict spiralling out of control and becoming a full-scale war between our countries is simply too big. We should cut our loses now and send out diplomatic feelers to the other side."
 MON_recruit_garmaev:0 "Recruit Garmaev"
 MON_recruit_garmaev_desc:0 "One of the [MAN.GetAdjective] Generals engaged at Khalkhin Gol, Urzhin Garmaev, has Buryat-Mongol roots. Out intelligence division reports that he has been holding his troops back from the battle, to avoid Mongols fighting brother Mongols. 

