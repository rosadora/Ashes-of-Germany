l_english:
 mongolian_great_purge.1.t:0 "Genden rebukes Stalin in [SOV.capital.GetName]"
 mongolian_great_purge.1.desc:0 "Tensions have been growing in recent years between our Prime Minister, Peljidiin Genden, and the [SOV.GetAdjective] Premier, Iosif Stalin, over Genden's refusal to crack down on [MON.GetNameDef]'s Buddhist clergy. \n\nThose tensions came to a head at our embassy in [SOV.capital.GetName]. Following a tense meeting, Genden publicly rebuked Stalin, allegedly even striking him and breaking his pipe. [SOV.GetAdjective] diplomats in [ROOT.capital.GetName] have made it clear that they expect Genden to be replaced directly."
 mongolian_great_purge.1.a:0 "Concerning."

 mongolian_great_purge.3.t:0 "General Accused of Collaboration"
 mongolian_great_purge.3.desc:0 "Disturbing reports have come to light that [?ROOT.MON_general_purge_target.GetName] has been in extensive contact with [JAP.GetAdjective] intelligence agents. Who knows how much detail of [MON.GetNameDef]'s defences has already been shared with the enemy? The Internal Affairs Committee recommends immediate action."
 mongolian_great_purge3_tt:0 "Our General §Y[?ROOT.MON_general_purge_target.GetName]§! will be purged."
 mongolian_great_purge.3.a:0 "Another traitor?"
 mongolian_great_purge.3.b:0 "There must be some mistake."

 mongolian_great_purge.4.t:0 "Government Minister Involved in Plot"
 mongolian_great_purge.4.desc:0 "The Internal Affairs Committee has discovered evidence of [?ROOT.MON_pol_purge_target.GetName]'s involvement in a reactionary plot on behalf of various Noyons and foreign Lamas. Apparently following Genden's example, [?ROOT.MON_pol_purge_target.GetSheHe] allegedly sought to undo the great progress we have made in the last two decades."
 mongolian_great_purge4_tt:0 "Our Political Advisor §Y[?ROOT.MON_pol_purge_target.GetName]§! will be purged."
 mongolian_great_purge.4.a:0 "A complete betrayal."
 mongolian_great_purge.4.b:0 "Perhaps we can make an exception."

 mongolian_great_purge.5.t:0 "Senior Army Figure Suspected of Treason"
 mongolian_great_purge.5.desc:0 "Evidence has been revealed of [?ROOT.MON_mil_purge_target.GetName]'s complicity in an intelligence ring involving Tibet, England and Japan. The allegations are serious and numerous, and had the plot been successful we would likely have been reduced to a colony of a foreign power."
 mongolian_great_purge5_tt:0 "Our Military Advisor §Y[?ROOT.MON_mil_purge_target.GetName]§! will be purged."
 mongolian_great_purge.5.a:0 "Thank goodness it was discovered in time."
 mongolian_great_purge.5.b:0 "The charges are unsubstantiated."

 mongolian_great_purge.6.t:0 "Anti-Communist Revolt"
 mongolian_great_purge.6.desc:0 "Apparently frustrated with our robust government reforms, a reactionary cabal appears to have gained support among various noyons, lamas, bandits and [JAP.GetAdjective] spies. No longer content with merely frustrating our progress, they have now taken up arms and declared themselves the rightful government of [ROOT.GetNonIdeologyNameDef]."
 mongolian_great_purge6_tt:0 "§RA civil war will start!§!"
 mongolian_great_purge.6.a:0 "Crush them!"

 mongolia_events.1.t:0 "The White Zud"
 mongolia_events.1.desc:0 "The herders who make up a majority of [Root.GetNameDef]'s population fear one thing above all others: zud, a great catastrophe that kills of huge numbers of their livestock, leaving them with no means to survive. This Winter is already proving unusually cold, and heavy snowfalls are preventing animals from grazing. Some are already describing this as the worst zud in living memory."
 mongolia_events.1.a:0 "Divert factories to compensate the herders."
 mongolia_events.1.b:0 "The war effort takes precedence."

 mongolia_events.2.t:0 "Legacy of the $MON_five_year_plan_dynamic_modifier$"
 mongolia_events.2.desc:0 "The $MON_five_year_plan_dynamic_modifier$ is complete, and has been a great success. We can now stand as an equal with the other industrial powers of the region."
 mongolia_events.2.a:0 "A credit to [MON.GetNonIdeologyAdjective] ingenuity."

 mongolia_events.3.t:0 "[MON.GetName] Supporting Dissent in Asia"
 mongolia_events.3.desc:0 "Reports have emerged that [MON.GetNameDef], under the rule of [MON.GetLeader], is actively promoting reactionary activity in [MON_unrest_state.GetName], and is soon planning to expand to our other Asian Republics. [MON.GetAdjective] agents are believed to be stirring unrest and encouraging anti-[ROOT.GetAdjective] sentiments among the local populations. This subversive behavior is a direct challenge to our authority in the region and threatens the stability of our Asian territories. We must counter this foreign interference and maintain control over our republics."
 mongolia_events.3.a:0 "We knew he couldn't be trusted."
 mongolia_events_3_tt:0 "Unlock §Y$MON_complete_the_revolution_decisions_sov$§! decisions to remove resistance cells in Asian states. §RIf we fail to remove the resistance cells and are in a war with [FROM.GetNameDef], the states will rebel against us!§!"

 mongolia_events.4.t:0 "Uprising in [MON_uprising_state.GetName]"
 mongolia_events.4.desc:0 "We have been aware of [MON.GetNameDef] subversive activities in [MON_uprising_state.GetName] for some time, but it seems that the instability caused by war between our two countries has caused the local population to take up arms in open revolt. Worryingly, our counter-intelligence officers suggest that further uprisings may be imminent."
 mongolia_events.4.a:0 "Crush them!"



### CIVIL WAR AID CHAINS

 mongolia_events.6.t:0 "[FROM.GetName] Calls for Volunteers"
 mongolia_events.6.desc:0 "Internal conflicts in [FROM.GetNameDef] have recently spiraled into civil war. The anti-Soviet forces have put out a call for Mongolian volunteers from the substantial Mongolian minority in the north of [ROOT.GetNameDef]."
 mongolia_events.6.a:0 "Let them go."
 mongolia_events.6.b:0 "Forbid it."

 mongolia_events.7.t:0 "[FROM.GetName] Sends Volunteers"
 mongolia_events.7.desc:0 "[FROM.GetNameDefCap] has informed our envoy that they will not seek to block our call for volunteers. We expect a significant influx from the Inner Mongolian population in the north of [FROM.GetNameDef]."
 mongolia_events.7.a:0 "They will be most welcome."

 mongolia_events.8.t:0 "[FROM.GetName] Refuses Volunteers"
 mongolia_events.8.desc:0 "[FROM.GetNameDefCap] has issued a decree forbidding [FROM.GetAdjective] citizens from participating in our civil war."
 mongolia_events.8.a:0 "We fight alone."

 mongolia_events.9.t:0 "[FROM.GetName] Requests Military Aid"
 mongolia_events.9.desc:0 "Internal conflicts in [FROM.GetNameDef] have recently spiraled into civil war. The anti-Soviet forces have contacted our diplomatic service, asking for military aid with which to arm their fighters."
 mongolia_events.9.a:0 "An opportunity to counter [SOV.GetAdjective] influence."
 mongolia_events.9.b:0 "We cannot spare the supplies."

 mongolia_events.10.t:0 "[FROM.GetName] Sends Arms"
 mongolia_events.10.desc:0 "[FROM.GetNameDefCap] has generously approved our request for aid. A shipment of small arms has been dispatched from their arsenal in [MAN.GetNameDef]."
 mongolia_events.10.a:0 "And [ROOT.GetNameDef] is grateful."

 mongolia_events.11.t:0 "[FROM.GetName] Refuses Aid"
 mongolia_events.11.desc:0 "[FROM.GetNameDefCap] has refused our request for military aid, claiming that their supplies are needed for their own army."
 mongolia_events.11.a:0 "We must rely on our own strength."

 mongolia_events.12.t:0 "[FROM.GetName] Requests Military Aid"
 mongolia_events.12.desc:0 "Internal conflicts in [FROM.GetNameDef] have recently spiraled into civil war. The [ROOT.GetAdjective]-aligned government has requested our military support in suppressing the counter-revolutionaries."
 mongolia_events.12.a:0 "We cannot allow Fascism to take hold."
 mongolia_events.12.b:0 "The resources would be better used elsewhere."

 mongolia_events.13.t:0 "[FROM.GetName] Dispatches Aid"
 mongolia_events.13.desc:0 "[FROM.GetNameDefCap] has generously approved our request for aid. A shipment of small arms has been dispatched from their arsenal in [564.GetName] and a newly-recruited column of troops has arrived in [ROOT.capital.GetCapitalVictoryPointName]."
 mongolia_events.13.a:0 "Our friendship is eternal."

 mongolia_events.14.t:0 "[FROM.GetName] Refuses Aid"
 mongolia_events.14.desc:0 "[FROM.GetNameDefCap] has refused our request for military aid, claiming that their supplies are needed for their own army."
 mongolia_events.14.a:0 "They abandon us in our hour of need."

 mongolia_events.15.t:0 "[ROOT.GetLeader]'s Ambition"
 mongolia_events.15.desc:0 "Until now, [ROOT.GetLeader] has ruled as a traditional Mongol prince, seeking always to live up to the spirit of Genghis Khan. However, he has recently acquired an unusual interest. The prince has become convinced that the future of warfare lies in naval bombing. With the supply of oil and other raw materials being vital to industrial warfare, control over the world's waterways is critical. The prince believes that naval bombers are the key to this control. Through a powerful fleet of naval bombers, we shall control the seas, and from there, the world!"
 mongolia_events.15.a:0 "We shall take no step back on the road to victory."
 mongolia_events.15.b:0 "Mongols belong on the ground."

 mongolia_alliance_events.1.t:0 "[FROM.GetName] Suggests an Alliance"
 mongolia_alliance_events.1.desc:0 "Concerned by the increasing prospect of conflict in Asia and the spread of anti-clerical ideologies, [FROM.GetNameDef] has proposed and alliance between our two countries. They argue that a show of strength and unity is the only way for us to protect our way of life. Some members of our foreign ministry, however, have expressed fears that abandoning political neutrality may unnecessarily draw us into conflict."
 mongolia_alliance_events.1.a:0 "An excellent idea."
 mongolia_alliance_events.1.b:0 "Politely decline."

 mongolia_alliance_events.2.t:0 "[FROM.GetName] Agrees to Alliance"
 mongolia_alliance_events.2.desc:0 "[FROM.GetNameDefCap] has accepted our proposal for an alliance. Diplomats from both countries signed a pact of everylasting friendship and cooperation in [FROM.capital.GetCapitalVictoryPointName] earlier today. This is a sure sign of great things to come for our two countries."
 mongolia_alliance_events.2.a:0 "Great!"

 mongolia_alliance_events.3.t:0 "[FROM.GetName] Declines Alliance"
 mongolia_alliance_events.3.desc:0 "Citing the need to maintain diplomatic neutrality, [FROM.GetNameDef] has declined our proposal for an alliance. Their ambassador has expressed his desire that this should not adversely affect our future relations."
 mongolia_alliance_events.3.a:0 "Disappointing."

# JAP alliance chain

 mongolia_alliance_events.4.t:0 "[FROM.GetName] Wishes to Join the [ROOT.GetFactionName]"
 mongolia_alliance_events.4.desc:0 "Perhaps conscious of their isolated geopolitical position, [FROM.GetNameDef] has asked to join the [ROOT.GetFactionName]. Such a move would bolster our alliance significantly, expanding its scope deep into the Asian continent."
 mongolia_alliance_events.4.a:0 "We are pleased to accept."
 mongolia_alliance_events.4.b:0 "That would leave us dangerously overextended."

 mongolia_alliance_events.5.t:0 "[FROM.GetName] Agrees to Alliance"
 mongolia_alliance_events.5.desc:0 "[FROM.GetNameDefCap] has accepted our application to join the [FROM.GetFactionName], and a treaty of everlasting friendship has been drawn up and signed by officials from both governments. We look forward to a prosperous future together."
 mongolia_alliance_events.5.a:0 "United we stand."

 mongolia_alliance_events.6.t:0 "[FROM.GetName] Declines Alliance"
 mongolia_alliance_events.6.desc:0 "[FROM.GetNameDefCap] has refused our application to join the [FROM.GetFactionName]. They did not give an official reason, but their ambassador has privately conveyed fears that such an alliance would risk drawing [FROM.GetNameDef] into distant conflicts in which it has limited ability to project power."
 mongolia_alliance_events.6.a:0 "Whatever happened to co-prosperity?"

# PRC alliance chain

 mongolia_alliance_events.7.t:0 "[FROM.GetName] Wishes to Join the [ROOT.GetFactionName]"
 mongolia_alliance_events.7.desc:0 "Perhaps conscious of their isolated geopolitical position, [FROM.GetNameDef] has asked to join the [ROOT.GetFactionName]. Such a move would bolster our alliance significantly, expanding its scope to the most northerly reaches of historical China."
 mongolia_alliance_events.7.a:0 "Let us raise the red flag together."
 mongolia_alliance_events.7.b:0 "We cannot risk war with [SOV.GetNameDef]."

 mongolia_alliance_events.8.t:0 "[FROM.GetName] Proposes an Alliance"
 mongolia_alliance_events.8.desc:0 "Perhaps conscious of their isolated geopolitical position, [FROM.GetNameDef] has offered an alliance, proposing that we join their newly-formed [FROM.GetFactionName]. Such a move would shift our diplomatic focus north, away from the heartland of China."
 mongolia_alliance_events.8.a:0 "Let us raise the red flag together."
 mongolia_alliance_events.8.b:0 "Ignore these renegades."

 mongolia_alliance_events.9.t:0 "[FROM.GetName] Agrees to Alliance"
 mongolia_alliance_events.9.desc:0 "[FROM.GetNameDefCap] has accepted our offer of an alliance under the banner of the [FROM.GetFactionName], and a treaty of everlasting friendship has been drawn up and signed by officials from both governments. We look forward to a prosperous future together."
 mongolia_alliance_events.9.a:0 "Arise, we who refuse to be slaves!"

 mongolia_alliance_events.10.t:0 "[FROM.GetName] Declines Alliance"
 mongolia_alliance_events.10.desc:0 "[FROM.GetNameDefCap] has refused our suggestion of a military alliance. Our diplomats fear that this is a sign that they plan to renew their imperial claims over [ROOT.GetNonIdeologyNameDef]."
 mongolia_alliance_events.10.a:0 "They are building a new Great Wall between our nations."

# ROC Kyakhta chain

 mongolia_alliance_events.11.t:0 "[FROM.GetName] Recognises [ROOT.GetAdjective] Suzerainty"
 mongolia_alliance_events.11.desc:0 "Perhaps conscious of their isolated geopolitical position, [FROM.GetNameDef] has come to us with an unexpected proposal. They offer to recognise [ROOT.GetAdjective] suzerainty over [FROM.GetNonIdeologyNameDef] in exchange for certain guarantees over their domestic autonomy."
 mongolia_alliance_events.11.a:0 "Finally, they see sense."
 mongolia_alliance_events.11.b:0 "They must suffer the consequences of their mistakes."
 mongolia_alliance_events_11_tt:0 "[FROM.GetNameDefCap] will become our subject."

 mongolia_alliance_events.12.t:0 "[FROM.GetName] Accepts [ROOT.GetAdjective] Submission"
 mongolia_alliance_events.12.desc:0 "[FROM.GetNameDefCap] has accepted our offer to reapply the terms of the Treaty of Kyakhta. An updated version of the treay has been drawn up and signed by officials from both governments. Though we have not achieved full independence, we hope that this will allow us a greater degree of freedom than under previous regimes."
 mongolia_alliance_events.12.a:0 "Unfortunate, but necessary."

 mongolia_alliance_events.13.t:0 "[FROM.GetName] Rejects Reconciliation"
 mongolia_alliance_events.13.desc:0 "[FROM.GetNameDefCap] has refused our offer to recognise their suzerainty over [ROOT.GetNameDef]. Our diplomats fear that this is a sign that they plan a direct conquest of [ROOT.GetNameDef]."
 mongolia_alliance_events.13.a:0 "Is there nothing that will satisfy them?"

 mongolia_alliance_events.14.t:0 "[FROM.GetName] Asserts Suzerainty Over Mongolia"
 mongolia_alliance_events.14.desc:0 "The [FROM.GetAdjective] ambassador has presented us with a declaration of suzerainty over [MON.GetNonIdeologyNameDef]. Presumably fearing that our armys would soon enter [MON.Capital.GetName], [MON.GetNameDef] has apparently submitted to the [FROM.GetAdjective] in exchange for their protection. [FROM.GetNameDefCap] now requests that we cease all hostilities."
 mongolia_alliance_events.14.a:0 "We would not wish to upset our friends in [FROM.GetNameDef]."
 mongolia_alliance_events.14.b:0 "They have made the claim, now let them defend it."
 
# UK/USA alliance chain

 mongolia_alliance_events.15.t:0 "[FROM.GetName] Wishes to Join the [ROOT.GetFactionName]"
 mongolia_alliance_events.15.desc:0 "Perhaps conscious of their isolated geopolitical position, [FROM.GetNameDef] has asked to join the [ROOT.GetFactionName]. As a fledgling Democracy, they likely seek our protection from expansionist powers in the region."
 mongolia_alliance_events.15.a:0 "We are pleased to accept."
 mongolia_alliance_events.15.b:0 "That would leave us dangerously overextended."

 mongolia_alliance_events.16.t:0 "[FROM.GetName] Welcomes Us into the [FROM.GetFactionName]"
 mongolia_alliance_events.16.desc:0 "[FROM.GetNameDefCap] has accepted our application to join the [FROM.GetFactionName], and a treaty of mutual aid and support has been drawn up and signed by officials from both governments. We look forward to a prosperous future together."
 mongolia_alliance_events.16.a:0 "United we stand."

 mongolia_alliance_events.17.t:0 "[FROM.GetName] Refuses an Alliance"
 mongolia_alliance_events.17.desc:0 "[FROM.GetNameDefCap] has refused our application to join the [FROM.GetFactionName]. They did not give an official reason, but their ambassador has privately conveyed fears that such an alliance would risk drawing [FROM.GetNameDef] into distant conflicts in which it has limited ability to project power."
 mongolia_alliance_events.17.a:0 "They will not stand up for democracy?"

# Soviet Mongolic territories chain

 mongolia_transfer_events.1.t:0 "[MON.GetName] Requests Territories"
 mongolia_transfer_events.1.desc:0 "The [MON.GetAdjective] ambassador has presented us with a request to transfer several of our territories to [MON.GetNameDef]. Its government apparently believes that the people in these territories have significant ethnic and cultural links to [MON.GetNonIdeologyNameDef], and argues for the unification of the wider Mongolic peoples. It goes on to point out the strong ties of friendship between our countries and the loyalty that they have shown us in our mutual struggle against reactionary forces."
 mongolia_transfer_events.1.a:0 "A reasonable request"
 mongolia_transfer_events.1.b:0 "[329.GetName] should satisfy them"
 mongolia_transfer_events.1.c:0 "That would not be to our advantage"

  mongolia_transfer_events.2.t:0 "[SOV.GetName] Transfers Territories"
 mongolia_transfer_events.2.desc:0 "We have received word that [SOV.GetLeader] has approved our request in full: all Mongolic territories of [SOV.GetNameDef] will be transferred to us. This is a momentous day in the struggle for [MON.GetNonIdeologyAdjective] unity."
 mongolia_transfer_events.2.a:0 "Great!"

 mongolia_transfer_events.3.t:0 "[SOV.GetName] Transfers [329.GetName]"
 mongolia_transfer_events.3.desc:0 "Though not fulfilling our entire request, [SOV.GetNameDef] has seen fit to transfer [329.GetName] to us. As a former part of [MON.GetNonIdeologyNameDef] under the Qing Empire, it was only natural that it should return to us."
 mongolia_transfer_events.3.a:0 "Good"

 mongolia_transfer_events.4.t:0 "[SOV.GetName] Refuses Our Request"
 mongolia_transfer_events.4.desc:0 "[SOV.GetNameDefCap] has refused our request to transfer their Mongolic territories, citing their importance to the [SOV.GetAdjective] economy. It seems that our dream of uniting the Mongols will never be realised."
 mongolia_transfer_events.4.a:0 "Disappointing"

 mongolia_transfer_events.5.t:0 "[FROM.GetName] Seeks to Integrate [MEN.GetName]"
 mongolia_transfer_events.5.desc:0 "The [FROM.GetAdjective] ambassador has approached us with a bold proposal. His government holds that the existence of separate Inner and Outer Mongolian states is an anomaly of history following the 1911 Chinese revolution. Accordingly, they argue that the two states should be merged, under their primary leadership."
 mongolia_transfer_events.5.a:0 "A sound proposal."
 mongolia_transfer_events.5.b:0 "[MEN.GetNameDefCap] should remain independent."

 mongolia_transfer_events.6.t:0 "[FROM.GetName] Agrees to Mongolian Unification"
 mongolia_transfer_events.6.desc:0 "[FROM.GetNameDefCap] has agreed to our proposal to unify Inner and Outer Mongolia. With a public proclamation held earlier today, the two governments have been merged, though naturally we hold the upper hand in the joint administration. We are one step closer to uniting the Mongol lands."
 mongolia_transfer_events.6.a:0 "We knew they would see sense."

 mongolia_transfer_events.7.t:0 "[MEN.GetName] Will Remain Independent"
 mongolia_transfer_events.7.desc:0 "[FROM.GetNameDefCap] has refused our request to unite the Mongolian states, pointing to alleged cultural differences between our two countries. Many in our government are already questioning the utility of our alliance with [FROM.GetNameDef]."
 mongolia_transfer_events.7.a:0 "There is no sense in this."

 mongolia_transfer_events.8.t:0 "[FROM.GetName] Requests Inner Mongolian Territories"
 mongolia_transfer_events.8.desc:0 "The [FROM.GetAdjective] ambassador has approached us with a bold proposal. His government has noted that we currently hold territories traditionally included within the boundaries of Inner Mongolia. While they have been administered separately from [FROM.GetNameDef] since the Chinese revolution of 1911, the government argue that it is now time for reunification."
 mongolia_transfer_events.8.a:0 "That seems reasonable."
 mongolia_transfer_events.8.b:0 "Refuse this naked land grab."

 mongolia_transfer_events.9.t:0 "[FROM.GetName] Transfers Inner Mongolian Territories"
 mongolia_transfer_events.9.desc:0 "[FROM.GetNameDefCap] has agreed to transfer their Inner Mongolian territories to us. Our troops and theirs exchanged gifts and well-wishes as control was handed over earlier today. We are one step closer to uniting the Mongol lands."
 mongolia_transfer_events.9.a:0 "[FROM.GetNameDefCap] has our eternal gratitude."

 mongolia_transfer_events.10.t:0 "[FROM.GetName] Refuses to Transfer Territories"
 mongolia_transfer_events.10.desc:0 "[FROM.GetNameDefCap] has refused our request to transfer their Inner Mongolian territories, despite the clear historical and ethnic ties that we have to them. Many in our government are already questioning the utility of our alliance with [FROM.GetNameDef]."
 mongolia_transfer_events.10.a:0 "How inconsiderate."

# Support for Inner Mongolia chain

 mongolia_transfer_events.11.t:0 "[MON.GetName] Seeks Mongolian Unification"
 mongolia_transfer_events.11.desc:0 "The [MON.GetAdjective] ambassador has presented us with a request to transfer several of our territories to [MON.GetNameDef]. Its government apparently believes that the people in these territories have significant ethnic and cultural links to [MON.GetNonIdeologyNameDef], and argues for the unification of the wider Mongolic peoples. It goes on to point out the strong ties of friendship between our countries and the loyalty that they have shown us in our mutual struggles."
 mongolia_transfer_events.11.a:0 "A reasonable request."
 mongolia_transfer_events.11.b:0 "Perhaps we can reach a compromise."
 mongolia_transfer_events.11.c:0 "That would not be to our advantage."

 mongolia_transfer_events.12.t:0 "[FROM.GetName] Transfers Territories"
 mongolia_transfer_events.12.desc:0 "We have received word that [FROM.GetLeader] has approved our request in full: all Inner Mongolian territories of [FROM.GetNameDef] will be transferred to us. This is a momentous day in the struggle for [MON.GetNonIdeologyAdjective] unity."
 mongolia_transfer_events.12.a:0 "Great!"

 mongolia_transfer_events.13.t:0 "[FROM.GetName] Seeks Compromise"
 mongolia_transfer_events.13.desc:0 "Though not fulfilling our entire request, [FROM.GetNameDef] has seen fit to transfer a portion of their Inner Mongolian territories to us. Our ambassador has pushed for further concessions, but it seems that they will not be moved."
 mongolia_transfer_events.13.a:0 "We will have to be content with that."

 mongolia_transfer_events.14.t:0 "[FROM.GetName] Refuses Our Request"
 mongolia_transfer_events.14.desc:0 "[FROM.GetNameDefCap] has refused our request to transfer their Inner Mongolian territories, citing their importance to the [FROM.GetAdjective] economy and large Han population. It seems that our dream of uniting the Mongols will never be realised."
 mongolia_transfer_events.14.a:0 "Disappointing."


### KHALKHIN GOL ###

 mon_border_conflict.1.t:0 "Mongolians Cross the Khalkha River"
 mon_border_conflict.1.desc:0 "Yesterday, a number of [MON.GetAdjective] troops crossed the Khalkha River, or Khalkhin Gol, apparently seeking pasture to graze their horses. The border between [MON.GetNameDef] and [MAN.GetNameDef] has long been under dispute, with the [MON.GetAdjective]s and their [SOV.GetAdjective] allies claiming territory several miles to the east of the legitimate border at the river. [MAN.GetAdjective] troops initially drove the [MON.GetAdjective]s back across the river, but they soon returned in greater numbers. Our border guards have thus far been unable to dislodge them."
 mon_border_conflict.1.a:0 "Unacceptable."

 mon_border_conflict.2.t:0 "[MON.GetAdjectiveCap] Victory at Khalkhin Gol"
 mon_border_conflict.2.desc:0 "Following a clash between [MON.GetAdjective] and [MAN.GetAdjective] forces in the border area around Khalkhin Gol, the Japanese ambassador in Moscow has requested a cease-fire. \n\n Several Japanese assaults on [MON.GetAdjective] positions failed with heavy casualties during the battle, raising concerns in the Japanese military about the capabilities of their forces."
 mon_border_conflict.2.a:0 "We graze our horses where we please."
 mon_border_conflict.2.b:0 "We must prepare an appropriate response."
 mon_border_conflict.2.c:0 "Northern expansion seems futile."

 mon_border_conflict.3.t:0 "[MON.GetName] Defeated Over Khalkha River"
 mon_border_conflict.3.desc:0 "Following a clash between [MON.GetAdjective] and Japanese forces in the border area around the Khalkha River, the [MON.GetAdjective] forces are reportedly in full retreat. Japanese units have occupied a number of strategic hills around the area and begun to fortify their positions.\n\nDuring the battle, the Japanese captured a number of [SOV.GetAdjective] tanks, which have been shipped to Tokyo for evaluation."
 mon_border_conflict.3.a:0 "Disappointing."
 mon_border_conflict.3.b:0 "We have settled this matter honorably."
 mon_border_conflict.3.c:0 "The army has performed well."

 mon_border_conflict.4.t:0 "Stalemate at Khalkhin Gol"
 mon_border_conflict.4.desc:0 "Fighting between Japanese and [MON.GetAdjective] forces around Khalkhin Gol has died down after both sides withdrew from the contested region to regroup and resupply. Recognizing the futility of further offensives, the Japanese military has asked for a cease-fire and negotiations to fix the border."
 mon_border_conflict.4.a:0 "We gained valuable experience."

 mon_border_conflict.5.t:0 "Escalation at Lake Khasan"
 mon_border_conflict.5.desc:1 "Fighting continues between Japanese and [SOV.GetAdjective] forces around Lake Khasan. In an effort to break the deadlock, Japanese forces in other areas have also started to engage [SOV.GetAdjective] forces in that sector. Intelligence suggests that the Japanese may soon reinforce the attack with fresh troops transferred from other parts of their Empire."
 mon_border_conflict.5.a:0 "We must hold the line."

 mon_border_conflict.6.t:0 "Escalation at Lake Khasan"
 mon_border_conflict.6.desc:0 "Fighting continues between [FROM.GetAdjective] and [JAP.GetAdjective] forces around Lake Khasan. In an effort to break the deadlock, [FROM.GetAdjective] forces in other areas have also started to engage [JAP.GetAdjective] forces in that sector. Intelligence suggests that [FROM.GetNameDef] may soon reinforce the attack with fresh troops transferred from other parts of their country."
 mon_border_conflict.6.a:0 "We must prepare to attack!"

 mon_border_conflict.7.t:0 "[SOV.GetName] Sends Military Assistance"
 mon_border_conflict.7.desc:0 "Concerned by recent [JAP.GetAdjective] and [MAN.GetAdjective] agression, [SOV.GetLeader] has announced a programme of military assistance. We understand that several [SOV.GetAdjective] divisions are en route towards Khalkhin Gol, accompanied by a significant air contingent and one of their top generals."
 mon_border_conflict.7.a:0 "Great."

 mon_border_conflict.8.t:0 "[JAP.GetName] Send Military Assistance"
 mon_border_conflict.8.desc:0 "Concerned by recent [MON.GetAdjective] and [SOV.GetAdjective] incursion into our territory, [JAP.GetLeader] has announced a programme of military assistance. We understand that several [JAP.GetAdjective] divisions are en route towards Khalkhin Gol, accompanied by a significant air contingent and one of their top generals."
 mon_border_conflict.8.a:0 "Great."

### NEWS EVENTS ###

 mongolia_news_events.1.t:0 "[MON.GetAdjectiveCap] Prime Minister Genden Arrested"
 mongolia_news_events.1.desc:0 "Peljidiin Genden, the Prime Minister of [MON.GetNameDef], has come under increasing scrutiny in the past months over his handling of relations with [SOV.GetNameDef]. Following a disastrous meeting with [SOV.GetLeader] in December, a plenary meeting of the [MON.GetRulingParty] was convened in Ulanbaatar to address the problem. Party members led by Dorjjavyn Luvsansharav strongly criticised Genden for his actions in Moscow and accused him of sabotaging Mongol-Soviet relations. Genden has been stripped of his office and placed under house arrest. [MON.GetLeader] has been appointed as Prime Minister in his place."
 mongolia_news_events.1.a:0 "[MON.GetLeader] seems like a more reliable choice."

 mongolia_news_events.2.t:0 "The Case of the Fourteen"
 mongolia_news_events.2.desc:0 "Fourteen senior generals and officials have been implicated by a major anti-[JAP.GetAdjective] intelligence case. The men appear to have been involved in a plot to reduce [MON.GetNameDef] to a [JAP.GetAdjective] colony. Following strict interrogation, the majority of the suspects have confessed their guilt and are ready to testify. \n\nThe case has now been prepared for public trial, which has been scheduled in the Bombogor Nogoon Theatre immediately. The people will soon know the truth about these prominent officials who betrayed [MON.GetNameDef], worked for the [JAP.GetAdjective] intelligence service and carried out subversive activities."
 mongolia_news_events.2.a:0 "We have every confidence that justice will be done."
 MON_14_trial_tt:0 "Character will be purged."

 mongolia_news_events.3.t:0 "[MON.GetAdjectiveCap] Prime Minister Amar Arrested"
 mongolia_news_events.3.desc:0 "After only a short time in office, Prime Minister Anandyn Amar has been arrested and charged with counter-revolution. According to the charges, he has helped anti-government plotters, opposed their arrest, and neglected the defense of the borders. He betrayed his own country and was a traitor to the revolution. Amar has been stripped of his office and expelled from the party. His case has passed to the NKVD and he is rumoured to already have been sent to Moscow. \n\nThe Central Committee has appointed [MON.GetLeader] in his place, who had vowed to root out any remaining subversive elements and restore order to [MON.GetNameDef]."
 mongolia_news_events.3.a:0 "We have complete confidence in [MON.GetLeader]."
 mongolia_news_events.3.b:0 "Hopefully they get the situation under control."

 mongolia_news_events.4.t:0 "[MON.GetLeader] Proclaims Greater Mongolia"
 mongolia_news_events.4.desc:0 "Mongolia's territory has expanded significantly in recent years, now including much of the former Inner Mongolia. In view of their recent success, [MON.GetLeader] has seen fit to announce the establishment of Greater Mongolia, a state to encompass all historical Mongolic lands. \n\nDuring a public parade in [MON.capital.GetName], [MON.GetLeader] was bestowed with numerous titles and accolades, and promised to work tirelessly to reclaim those Mongolic lands still lying outside the country's borders, as well as an expansion of the bureaucracy to more fully integrate Mongolia's new territories."
 mongolia_news_events.4.a:0 "Three cheers for [MON.GetLeader]!"
 mongolia_news_events.4.b:0 "Good for them.
 mongolia_news_events.4.c:0 "We will have to put them in their place."

 mongolia_news_events.5.t:0 "Arrival of the Jebtsundamba Khutuktu"
 mongolia_news_events.5.desc:0 "When Bogd Khan died in 1924 and the Communist authorities forbade the search for his reincarnation, some thought that a chapter of Mongolian history was closed forever. Today, those fears have been dispelled for good. Reportedly, lamas in Tibet identified the Bogd Khan's successor and raised the boy in secret. \n\nNow that the hated Communists have been ousted, Lhasa has seen fit to reveal this fact so that the young Jebtsundamba Khutuktu can take his proper place in Mongolia. An enthronement ceremony has been held in the Gandantegchinlen Monastery and the new Bogd Khan has been entrusted to the care of Mongolia's wisest lamas. The whole country rejoices at this joyous news."
 mongolia_news_events.5.a:0 "A deep wound has been healed."

 mongolia_news_events.11.t:0 "Return of the Yuan?"
 mongolia_news_events.11.desc:0 "When Mongolian troops rode into $VICTORY_POINTS_9843$ some months ago, many expected a short occupation, negotiations, or the establishment of a puppet regime. Over recent weeks, however, increasing numbers of Mongolian officials have made themselves resident in the city. Today, the Mongolian government has officially relocated to the city they are now calling '$MON_revive_the_yuan_VP_9843$.' \n\nIn an elaborate ceremony, the new government proclaimed the creation of [MON.GetNameDef], harking back to the regime that ruled China in the late thirteenth and fourteenth centuries. It remains to be seen if this will bring an end to the conflict that has plagued China in recent decades."
 mongolia_news_events.11.a:0 "Our rule will bring about peace."
 mongolia_news_events.11.b:0 "An impressive display."
 mongolia_news_events.11.c:0 "Their pretensions are fooling nobody."
 mongolia_news_events.11.d:0 "Yet another army marches into China."