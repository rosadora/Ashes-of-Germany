l_english:

#########################
### INDUSTRIAL BRANCH ###
#########################

 MON_five_year_plan:0 "Five-Year Plan"
 MON_five_year_plan_desc:0 "[MON.GetNameDefCap] is woefully undeveloped. We need to make a plan for the country's economic development to match our potential rivals."

 MON_expand_mining_operations:0 "Expand Mining Operations"
 MON_expand_mining_operations_desc:0 "[MON.GetNameDefCap] is rich in natural resources, but only a small fraction of the country has been examined for deposits. New prospecting operations will find the fuel for our economic development."
 MON_expand_mining_operations_tt:0 "Modify §Y$MON_five_year_plan_dynamic_modifier$ §!by\nResource Gain Efficiency: §G+25%§!\n\n"

 MON_nalaikh_coal_mine:0 "Nalaikh Coal Mine"
 MON_nalaikh_coal_mine_desc:0 "There are significant coal deposits in Nalaikh, near [330.GetName]. Exploiting these deposits will help to kickstart our industrial development."

 MON_coal_liquification:0 "Coal Liquification"
 MON_coal_liquification_desc:0 "[MON.GetNameDefCap] is lacking in oil, and so we should commence efforts in the field of synthetic oil."

 MON_copper_mining:0 "Copper Mining"
 MON_copper_mining_desc:0 "There are copper deposits scattered across [MON.GetNonIdeologyNameDef]. These hold great potential for improving our infrastructure, particularly in the field of electronics."

 MON_increase_gold_exports:0 "Increase Gold Exports"
 MON_increase_gold_exports_desc:0 "[MON.GetNonIdeologyNameDefCap] has been mining gold for a long time. Increasing our production will give us an edge when negotiating trade deals."

 MON_uranium_mining:0 "Uranium Mining"
 MON_uranium_mining_desc:0 "Uranium deposits have been found in the Saddle Hills of northeastern [MON.GetNonIdeologyName]. Our scientists have informed us that these could help us unlock the secrets of atomic energy."

 MON_trans_mongolian_railway:0 "Trans-Mongolian Railway"
 MON_trans_mongolian_railway_desc:0 "As a landlocked country, rail will be the key to modernisation in [MON.GetNameDef]. We should start by proposing a line across the country, from $VICTORY_POINTS_7835$ in the north to $VICTORY_POINTS_11752$ in the south."
 MON_trans_mongolian_railway_tt:0 "Modify §Y$MON_five_year_plan_dynamic_modifier$ §!by\n§YRailway§! construction speed: §G+20.00%§!\n\n"

 MON_connecting_our_country:0 "Connecting Our Country"
 MON_connecting_our_country_desc:0 "The Trans-Mongolian Railway was just the beginning. Expanding our railways will allow for efficient transportation of heavy freight, as well as improving our logistics network."
 MON_connecting_our_country_tt:0 "Modify §Y$MON_five_year_plan_dynamic_modifier$ §!by\n§Y$supply_node$§! construction speed: §G+20.00%§!\n\n"

 MON_livestock_breeding_programmes:0 "Livestock Breeding Programmes"
 MON_livestock_breeding_programmes_desc:0 "We Mongols are a hardy people, used to surviving by our own means. By supporting pastoralism, we can save our industrial capacity for where it's really needed."
 MON_livestock_breeding_programmes_tt:0 "Modify §Y$MON_five_year_plan_dynamic_modifier$ §!by\nConsumer Goods Factories factor: §Y-10.0%§!\n\n"

 MON_develop_ulaanbaatar:0 "Develop [330.GetName]"
 MON_develop_ulaanbaatar_desc:0 "The population of [330.GetName] has swelled significantly in the last few decades. We should develop the city's infrastructure to provide for these people and make good use of their labour. We will make [330.GetName] a capital worthy of [MON.GetNameDef]!"
 MON_develop_ulaanbaatar_330:0 "Urga"
 MON_develop_ulaanbaatar_VP_4801:0 "Urga"

 MON_state_university:0 "[GetMONStateUniversityName]"
 MON_state_university_choibalsan:0 "Choibalsan State University"
 MON_state_university_alt:0 "National University of Mongolia"
 MON_state_university_desc:0 "The need for professional personnel is acutely felt in [MON.GetNameDef]. Secondary schools are no longer sufficient to meet the demand for technical specialists. We should prepare the establishment of an institution of higher learning to educate the future [MON.GetAdjective] elite."

 MON_rural_development:0 "Rural Development"
 MON_rural_development_desc:0 "We have a vast land and great potential. All that remains is to reach out and grasp it."

 MON_create_an_industrial_base:0 "Create an Industrial Base"
 MON_create_an_industrial_base_desc:0 "Heavy industry will be the engine of our industrial development. We must create the foundations of our new economy."
 MON_create_an_industrial_base_tt:0 "Modify §Y$MON_five_year_plan_dynamic_modifier$ §!by\n§YCivilian Factory§! construction speed: §G+25.00%§!\n\n"

 MON_domestic_weapons_production:0 "Domestic Weapons Production"
 MON_domestic_weapons_production_desc:0 "We can't allow ourselves to be reliant on others for our defence. Controlling arms production will safeguard our independence."
 MON_domestic_weapons_industry_tt:0 "Modify §Y$MON_five_year_plan_dynamic_modifier$ §!by\n§YMilitary Factory§! construction speed: §G+25.00%§!\n\n"

 MON_national_specialists:0 "National Specialists"
 MON_national_specialists_desc:0 "Sustainable economic development requires a high level of expertise among domestic producers. We need [MON.GetAdjective] factories run by [MON.GetAdjective] engineers."

 MON_soviet_military_investment:0 "[SOV.GetAdjectiveCap] Military Investment"
 MON_soviet_military_investment_desc:0 "Our friends in [SOV.capital.GetName] have great experience with military industry and are eager to assist us. Their help will be invaluable in kickstarting our economy."
  MON_soviet_military_investment_auto:0 "Soviet Military Investment"

 MON_invite_soviet_production_experts:0 "Invite [SOV.GetAdjectiveCap] Production Experts"
 MON_invite_soviet_production_experts_desc:0 "Machines are useless without the expertise to properly operate them. We should invite [SOV.GetAdjective] technical specialists to advise our engineers."

 MON_culture_of_industry:0 "Culture of Industry"
 MON_culture_of_industry_desc:0 "While pastoralism will always be important to [MON.GetNameDef], industry is the future. We must instill a respect for engineers and manufacturing in the [MON.GetAdjective] people."

 MON_triumph_of_the_five_year_plan:0 "Triumph of the Five-Year Plan"
 MON_triumph_of_the_five_year_plan_desc:0 "The Five-Year Plan has been completed and has been a great success. It has transformed [MON.GetNameDef] from an expanse of empty steppe into a rising industrial and technological power. We are sure to benefit from this for decades to come."
 MON_triumph_of_the_five_year_plan_trigger:0 "Has national spirit §Y$MON_five_year_plan_dynamic_modifier$§!"
 MON_triumph_of_the_five_year_plan_tt:0 "When the §Y$MON_five_year_plan_dynamic_modifier$§! national spirit expires, the §Y$MON_pastoral_society$§! national spirit will improve."

##########################
### POLITICAL BRANCHES ###
##########################

 MON_has_not_chosen_path_trigger_tt:0 "Has not completed §Y$MON_purge_the_traitors$§!, §Y$MON_third_mongolian_revolution$§! or §Y$MON_throw_off_the_yoke$§!"

#########################
### HISTORICAL BRANCH ###
#########################

 MON_strife_within_the_party:0 "Strife Within the Party"
 MON_strife_within_the_party_desc:0 "The [MON.GetCommunistParty] is fraught with tension. There are deep divisions over the speed and nature of collectivisation, as well as over our alliance with [SOV.GetNameDef]. All the while, the [SOV.GetAdjective]s themselves seem increasingly concerned about our internal affairs. We must work towards unity if the revolution is to endure."

 MON_exile_genden:0 "Exile Genden"
 MON_exile_genden_desc:0 "While Prime Minister Genden may have served [MON.GetNameDef] well in the past, his recent actions have been cause for concern. Not only has he strained our diplomatic relations, he has personally insulted and even assaulted Stalin himself. Genden jeopardises our relationship with [SOV.capital.GetName], and must be removed from power."

 MON_state_publishing_company:0 "State Publishing Company"
 MON_state_publishing_company_desc:0 "It is critical that the people understand and support our programme. We must speak to them clearly and simply, so that all will know how best they can serve their country."
 MON_state_publishing_company_tt:0 "Unlocks £SOV_propaganda_text_icon §Y$MON_propaganda_campaigns$§! Decisions."

 MON_treaty_with_the_ussr:0 "Treaty with the USSR"
 MON_treaty_with_the_ussr_desc:0 "The support of [SOV.GetNameDef] was critical to establish the Mongolian People's Republic, and they have protected us from the threat of [CHI.GetNonIdeologyAdjective] aggression ever since. Let us reinforce this relationship with a Protocol Treaty of Friendship and Mutual Assistance."

 MON_army_allegiance:0 "Army Allegiance"
 MON_army_allegiance_desc:0 "The situation in [CHI.GetNonIdeologyNameDef] shows how easily a divided nation can be preyed upon by foreign powers. We must ensure that our soldiers can be relied upon, or our army will worse than useless."
 MON_army_allegiance_tt:0 "In the event of a civil war, a majority of the army will side with us."

 MON_loyalty_to_moscow:0 "Loyalty to Moscow"
 MON_loyalty_to_moscow_desc:0 "There have been problems in the past with [MON.GetAdjective] officers conspiring with foreign powers, particularly with [JAP.GetNameDef]. We must take steps to ensure our officers' loyalties. Unity is our best chance to thrive as a nation."
 MON_loyalty_to_moscow_tt:0 "Two random army leaders will gain the §Y$trait_MON_stalinist_loyalties$§! trait."

 MON_internal_affairs_committee:0 "Internal Affairs Committee"
 MON_internal_affairs_committee_desc:0 "With Genden removed from power, our country has bought itself time, but he was surely only one of many who would undermine [MON.GetNameDef]. We should empower the Internal Affairs Committee to arrest officials suspected of sedition."

 MON_purge_the_traitors:0 "Purge the Traitors"
 MON_purge_the_traitors_desc:0 "Rumours of collaboration with the [JAP.GetAdjective] have swirled around our officer corps for years, and have only intesified in recent months. It is clear that many in our army cannot be trusted. How can the defence of [MON.GetNameDef] be left to such men? We must rid our government of anyone whose loyalty cannot be assured."
 MON_purge_the_traitors_tt:0 "Purge events will start."
 MON_purge_the_traitors_tt2:0 "§RIf Stability falls below 25% while the Purge is ongoing, a civil war will start!§!"

 MON_assassinate_demid:0 "Assassinate Demid"
 MON_assassinate_demid_desc:0 "No man can serve two masters, and yet [MON.GetNameDef] has ended up with two commanders-in-chief. This risks creating division at this critical time. With Demid out of the picture, the army's loyalty can be assured."
 MON_assassinate_demid_tt1:0 "§Y[MON.MON_gelegdorjiin_demid.GetName]§! will die."
 MON_assassinate_demid_tt2:0 "Generals will no longer be targeted by purge events."

 MON_remove_amar:0 "Remove Amar"
 MON_remove_amar_desc:0 "Our hopes that Amar would prove a better leader than Genden appear to have been ill-founded. Indeed, evidence has come to light that Amar has helped anti-government plotters, opposed their arrest and neglected the defence of the borders. We must get rid of this feudal troublemaker."

 MON_end_the_purges:0 "End the Purges"
 MON_end_the_purges_desc:0 "While fears about [JAP.GetAdjective] infiltration were no doubt well-founded, the purges have gone far enough. Overzealous officials have wreaked havok on the party, and this must be brought to an end. The architects of these excesses must be arrested and tried for their crimes."

 MON_order_366:0 "Order 366"
 MON_order_366_desc:0 "Despite our efforts to ensure our nation's security, it is becoming increasingly clear that [MON.GetAdjective] has fallen under the influence of [JAP.GetAdjective] spies and provocateurs. We must redouble our efforts to thwart these underhanded attacks."

 MON_reveal_japanese_plans:0 "Reveal Japanese Plans"
 MON_reveal_japanese_plans_desc:0 "[JAP.GetNameDefCap] has long sought to expand its influence over Asia, including over [MON.GetNameDef]. Our intelligence service reports that they are now actively considering plans for an invasion. We must be vigilant."

 MON_war_with_japan:0 "War with Japan"
 MON_war_with_japan_desc:0 "[JAP.GetNameDefCap]'s imperialist project has gone far enough. They pose a vital threat to our independence, and must be stopped."

 MON_support_the_global_struggle:0 "Support the Global Struggle"
 MON_support_the_global_struggle_desc:0 "Across the world, tensions are rising. We must begin to look beyond our borders if we do not wish the enemies of the revolution to bring strife to our doorstep. We should start by redoubling our suppport for [SOV.GetNameDef] in their fight against Fascism."

 MON_utilise_our_strengths:0 "Utilise Our Strengths"
 MON_utilise_our_strengths_desc:0 "'From each according to his ability, to each according to his needs.' While [MON.GetNameDef] may lack the industrial might of [SOV.GetNameDef], our horses are second to none. Let us support our comrades' war effort in the areas where we are the strongest."

 MON_revolutionary_mongolia_column:0 "Revolutionary Mongolia Column"
 MON_revolutionary_mongolia_column_desc:0 "We will fund the construction of tanks to outfit a brigade, to support the war effort. Their crews will ride proudly into battle knowing that they bear the name of [MON.GetNameDef]!"
 MON_revolutionary_mongolia_column_tt:0 "(§Y[330.GetName]§!): Create §Y1 Tank division§!."

 MON_arat_squadron:0 "Arat Squadron"
 MON_arat_squadron_desc:0 "We will contribute funds towards the creation of a fighter squadron. Air power is the mark of a modern nation; now none will think us merely as a land of nomadic pastoralists and herdsmen."
 Aleksandr:0 "Aleksandr"
 Mayorov:0 "Aleksandr"
 Traveller:0 "Traveller"

 MON_research_cooperation:0 "Research Cooperation"
 MON_research_cooperation_desc:0 "We should propose a joint research initiative with [SOV.GetNameDef]. Admittedly, we may have more to learn from them than vice versa, but both of our nations will surely benefit from this."

 MON_pursue_independence:0 "Pursue Independence"
 MON_pursue_independence_desc:0 "The [SOV.GetAdjectiveCap]s are our greatest allies and have helped us immensely over the past two decades. Thanks to them, we are now in a position to realise the independence that we have sought for so long."
 MON_pursue_independence_auto:0 "$MON_pursue_independence$"

 MON_join_the_soviet_union:0 "Join the Soviet Union"
 MON_join_the_soviet_union_desc:0 "It is clear: [MON.GetNonIdeologyNameDef]'s future is within [SOV.GetNameDef]. Integrating our country will ensure its prosperity and modernisation."

 MON_request_soviet_territories:0 "Request Soviet Territories"
 MON_request_soviet_territories_desc:0 "[SOV.GetNameDefCap] holds several territories largely inhabited by Mongolic peoples. As we have proven our loyalty to the [SOV.GetAdjective] cause beyond doubt, they may be willing to transfer these territories to us."

 MON_deal_with_the_lamas:0 "Deal with the Lamas"
 MON_deal_with_the_lamas_desc:0 "The religious institutions of [MON.GetNameDef] are holding it back, and are likely focal points for dissent. There is even evidence that some monasteries are working with the [JAP.GetAdjective] to undermine the country. We must put the most troublesome offenders on trial for treason, and force the rest out of their temples. They will serve [MON.GetNameDef] much better in our armies."

 MON_rural_education:0 "Rural Education"
 MON_rural_education_desc:0 "With the demise of the regressive monasteries, we can now establish a modern education system. Every [MON.GetAdjective] child will have the opportunity to learn about modern science, engineering and animal husbandry."

 MON_adopt_cyrillic:0 "Adopt Cyrillic"
 MON_adopt_cyrillic_desc:0 "It is difficult to communicate with our allies when we use an entirely different writing system. Let us adopt the Cyrillic alphabet, which will draw us closer to our allies in [SOV.capital.GetName] and give us easier access to the latest scientific innovations."

 MON_improve_literacy_rates:0 "Improve Literacy Rates"
 MON_improve_literacy_rates_desc:0 "We will never tap into the true intellectual potential of the [MON.GetAdjective] people when so many are illiterate herders, completely disconnected from modern thought. We must establish programmes to promote literacy throughout the population."


 MON_tenth_party_congress:0 "Tenth Party Congress"
 MON_tenth_party_congress_desc:0 "Free of factionalism at last, we can now hold a party congress to set out our vision of the future. We will strengthen the unbreakable fraternal friendship with [SOV.GetNameDef] and continue our non-capitalist development under the banner of Marxist-Leninist teaching."

 MON_revise_the_constitution:0 "Revise the Constitution"
 MON_revise_the_constitution_desc:0 "We have already made great progress towards socialism, and it is time to move our country to the next stage. We will adopt a new constitution based on our [SOV.GetAdjective] friends' Stalin Constitution, codifying the [MON.GetRulingParty]'s central position in society."

 MON_expand_the_youth_league:0 "Expand the Youth League"
 MON_expand_the_youth_league_desc:0 "While certainly necessary to our national security, the recent purges have left the ranks of our government and senior officers rather depleted. Promotions of talented candidates from lower ranks will only get us so far. The Mongolian Revolutionary Youth League will help us to recruit the next generation of [MON.GetAdjective] leaders."

 MON_political_commissars:0 "Political Commissars"
 MON_political_commissars_desc:0 "Recent events have shown the necessity of total loyalty in the army. How can our soldiers fight if they cannot trust their comrades? We will ensure that every unit has a commissar attached to see to their political education."

 MON_the_flowering_future:0 "The Flowering Future"
 MON_the_flowering_future_desc:0 "With internal strife behind us, we can now look ahead, to the growing prosperity of the motherland, our beloved leader [MON.GetCommunistLeader], and the flowering future!"

 MON_introduce_negdels:0 "Introduce Negdels"
 MON_introduce_negdels_desc:0 "While our previous attempt at collectivisation was ill-fated, we have learnt much since then and the [MON.GetAdjective] nation has grown. This time, we will get it right. We will introduce the negdel, or agricutural association, to improve production and ensure that all workers are justly rewarded for their labour."

 MON_urbanisation:0 "Urbanisation"
 MON_urbanisation_desc:0 "While [MON.GetNameDef] has a great number of agricultural and pastoral workers, we lack an industrial workforce. Constructing modern housing will allow some of our people to move into cities, improving productivity."
 MON_urbanisation_VP_12557:0 "Choibalsan"

 MON_socialist_science:0 "Socialist Science"
 MON_socialist_science_desc:0 "Science and technology are crucial to the ideology and practical functioning of a socialist state. Our commitment to the revolution has allowed us to move beyond archaic superstitions and into the world of the future."

############################
### ALT COMMUNIST BRANCH ###
############################

 MON_undermine_the_nkvd:0 "Undermine the NKVD"
 MON_undermine_the_nkvd_desc:0 "[SOV.GetNameDefCap] has helped us in the past, but in recent years their premier, [SOV.GetLeader], has become a virtual [SOV.GetNonIdeologyAdjective] Tsar. The [SOV.GetAdjective] attempts to control our country rank with the worst excesses of imperialism in the last century. We must escape their influence if we are to have a future."
 MON_undermine_the_nkvd_auto:0 "$MON_undermine_the_nkvd$"

 MON_influence_the_officer_corps:0 "Influence the Officer Corps"
 MON_influence_the_officer_corps_desc:0 "[MON.GetNameDefCap]'s soldiers don't fight for [SOV.GetLeader], they fight for [MON.GetNonIdeologyName]. There are many who will be eager to side with us in our fight for independence."
 MON_influence_the_officer_corps_tt:0 "Three random army leaders will gain the §Y$trait_MON_nationalist_sympathies$§! trait."

 MON_chinese_volunteers:0 "Chinese Volunteers"
 MON_chinese_volunteers_desc:0 "In 1921, the Soviets helped us to escape Chinese occupation, but soon became tyrants themselves. We could appeal to the Chinese to help expel the Soviets in return."
 MON_chinese_volunteers_tt:0 "Unlocks a decision to request Chinese volunteers during a civil war."

 MON_japanese_arms:0 "Japanese Arms"
 MON_japanese_arms_desc:0 "Collaboration with Japanese agents has been a common charge in the show trials of those opposed to the Soviet-backed regime. These charges have so far all been false, but Japan could be a useful ally in our struggle for independence."
 MON_japanese_arms_tt:0 "Unlocks a decision to request Japanese arms during a civil war."

 MON_rehabilitate_lkhumbe:0 "Rehabilitate Lkhümbe"
 MON_rehabilitate_lkhumbe_desc:0 "Jambyn Lkhümbe, a member of the Politburo, was executed in 1934 for allegedly conspiring with [JAP.GetNameDef] to turn the country into a puppet state. These charges always looked flimsy, and it is long past time to reveal the truth: the real conspirators are the NKVD and its agents, and the country trying to gain control of [MON.GetNameDef] is not [JAP.GetNameDef] but [SOV.GetNameDef]!"
 MON_rehabilitate_lkhumbe_auto:0 "$MON_rehabilitate_lkhumbe$"

 MON_third_mongolian_revolution:0 "Third Mongolian Revolution"
 MON_third_mongolian_revolution_desc:0 "Our first revolution freed us from Chinese domination; our second revolution saw off the White Russian bandits. Now, it is time for a third revolution to expel the Soviets and their agents. Only when this is done will [MON.GetNonIdeologyNameDef] be free at last."
 MON_third_mongolian_revolution_tt:0 "§RIf Stability is below 25%, a civil war will start!§!"

 MON_take_control_of_the_party:0 "Take Control of the Party"
 MON_take_control_of_the_party_desc:0 "The factionalism and infighting must end. We will make it clear that there is no room in the party for those who are not wholly committed to [MON.GetAdjective] independence."

 MON_mongolian_socialism:0 "[MON.GetAdjective] Socialism"
 MON_mongolian_socialism_desc:0 "Now that the Stalinists have been expelled from our government, we have an opportunity to show the people a different vision of socialism: a [MON.GetAdjective] socialism."

 MON_modern_syncretism:0 "Modern Syncretism"
 MON_modern_syncretism_desc:0 "[MON.GetNonIdeologyAdjectiveCap]s have always been welcoming of new ideas. We have often adopted foreign ideas and religions, and integrated them into our national consciousness to create something uniquely [MON.GetNonIdeologyAdjective]. Socialism is merely the latest of these ideas. we will adopt socialism in a way that complements our national traditions, rather than seeking to replace them."

 MON_two_great_geniuses:0 "Two Great Geniuses"
 MON_two_great_geniuses_desc:0 "On earth there have been two great geniuses: Buddha and Lenin. It is our ability to combine the insights of these two titans, and to take on the ideas of other thinkers, that will be the great strength of our nation."

 MON_a_nation_on_horseback:0 "A Nation on Horseback"
 MON_a_nation_on_horseback_desc:0 "A Mongol without a horse is like a bird without wings. We will ensure that our people have everything they need to live a proper Mongolian life."
 MON_a_nation_on_horseback_tt:0 "Modify §Y$MON_legacy_of_the_khans_dynamic_modifier$ §!by\nTraining time: §G-10.00%§!\n\n"

 MON_complete_the_revolution:0 "Complete the Revolution"
 MON_complete_the_revolution_desc:0 "It is not enough the Outer Mongolia is free; even now Buryats and other Mongolic peoples suffer under the [SOV.GetAdjective] yoke. We should provide these people with the means to break their chains."
 MON_complete_the_revolution_tt:0 "Unlocks decisions to provoke unrest in Mongolic states in §Y[SOV.GetNameDef]§!. If we are at war with §Y[SOV.GetNameDef]§!, we will be able to provoke uprisings in states with unrest."
 MON_complete_the_revolution_tt2:0 "Unlocks §YEspionage Operations§! to initiate resistance in states with unrest."
 MON_incite_resistance_operation:0 "Incite Rebellion in Soviet-Occupied Asian Republics"
 MON_incite_resistance_operation_desc:0 "We cannot allow [SOV.GetNameDef] to continue its oppression of Mongolic and Turkic peoples within its borders. The [SOV.GetAdjective] imperial system must be dismantled."
 MON_incite_resistance_operation_tt:0 "Initiate or boost resistance activity in the target state."

 MON_end_soviet_imperialism:0 "End Soviet Imperialism"
 MON_end_soviet_imperialism_desc:0 "[SOV.GetNameDefCap] claims to oppose imperialism, yet jealously clings onto their old Russian imperial possessions. What right does this Georgian Tsar have to Kazakh or Kyrgyz land?"
 MON_end_soviet_imperialism_tt:0 "Unlocks decisions to provoke unrest in Central Asian states in §Y[SOV.GetNameDef]§!. If we are at war with §Y[SOV.GetNameDef]§!, we will be able to provoke uprisings in states with unrest."
 MON_end_soviet_imperialism_tt2:0 "Unlocks §YEspionage Operations§! to initiate resistance in states with unrest."
 
 MON_inner_mongolian_revolution:0 "Inner Mongolian Revolution"
 MON_inner_mongolian_revolution_desc:0 "For thirty years, we have been separated from our kin in Inner Mongolia. They were not able to join our first bid for independence; let us reach out a hand and give them a second chance."
 MON_inner_mongolian_revolution_tt:0 "Unlocks decisions to provoke unrest in Inner Mongolian states not owned by §Y[MEN.GetNameDef]§!. If we are at war with §Y[MEN.GetNameDef]§!, we will be able to stage a coup with Communist sympathisers in the region."
 MON_inner_mongolian_revolution_tt2:0 "Unlocks §YEspionage Operations§! to initiate resistance in states with unrest."
 MON_incite_resistance_operation_men:0 "Instigate Rebellion in Inner Mongolia"
 MON_incite_resistance_operation_men_desc:0 "Our Inner Mongolian brothers did not join our bid for independence in 1911. We should covertly support pro-independence groups in the region to rectify this."

 MON_strike_at_the_heart:0 "Strike at the Heart"
 MON_strike_at_the_heart_desc:0 "We will never be secure in our independence as long as [SOV.GetLeader] sits in the Kremlin. The best we could expect is an uneasy truce while the [SOV.GetAdjective]s gather their strength and wait to strike. We must act, before they get the chance."

 MON_looking_outward:0 "Looking Outward"
 MON_looking_outward_desc:0 "The Bogd Khanate met its downfall after the Russian Revolution left it diplomatically isolated. Allies will be essential if we are to achieve a lasting independence."

 MON_approach_sinkiang:0 "Approach Sinkiang"
 MON_approach_sinkiang_desc:0 "We need allies in the region. [SIK.GetNameDefCap] not only shares our socialist principles, but is also in a similar position to us, caught between [CHI.GetNameDef] and [SOV.GetNameDef]. Cooperation could benefit us both."

 MON_chinese_socialism:0 "Chinese Socialism"
 MON_chinese_socialism_desc:0 "The [SOV.GetAdjective] model of Communism is clearly not applicable to [MON.GetNameDef]. The Stalinist attempt to impose [SOV.GetAdjective] Communism on [MON.GetNameDef] was akin to 'cutting the feet to fit the shoes.' [PRC.GetLeader] is sympathetic to this line of thinking; we may be able to form a pact of mutual assistance on this basis."
 MON_mutual_assistance_bloc:0 "Mutual Assistance Bloc"

 MON_revive_the_treaty_of_kyakhta:0 "Revive the Treaty of Kyakhta"
 MON_revive_the_treaty_of_kyakhta_desc:0 "The [CHI.GetAdjective] government has never recognised [MON.GetAdjective] independence, hoping to maintain the borders of the old Qing Empire. While the terms of the Treaty of Kyakhta were not what we had hoped for, they did at least allow [MON.GetNameDef] a large degree of domestic autonomy, more than can be said for working with the [SOV.GetAdjective]s. We should propose a renewal of the treaty to the [CHI.GetAdjective] government."

 MON_primacy_of_praxis:0 "Primacy of Praxis"
 MON_primacy_of_praxis_desc:0 "If the past few decades have shown anything, it is that dogmatically forcing Mongolia to follow the Soviet path leads only to tyranny. We must chart a new course with our Asian allies, in which action takes precedence over ideological orthodoxy."
 MON_primacy_of_praxis_tt:0 "We will gain §Y1 Military Factory§! for each Chinese Communist ally, and they will each gain §Y1 Military Factory§!."

 MON_inner_mongolia_for_support:0 "Inner Mongolia for Support"
 MON_inner_mongolia_for_support_desc:0 "Now that we have reconciled with the Chinese, the distinction between 'Inner' and 'Outer' Mongolia is artificial. We should now seek re-unification, reminding our new allies of our substantial contributions to the cause of Chinese independence."

##########################
### NATIONALIST BRANCH ###
##########################

 MON_nationalist_sentiment:0 "Nationalist Sentiment"
 MON_nationalist_sentiment_desc:0 "[MON.GetNonIdeologyNameDefCap] suffered under Qing rule for centuries until the revolution of 1911. Though the flames of [MON.GetNonIdeologyAdjective] nationalism have died down somewhat, they remain the only foundation for a strong [MON.GetNonIdeologyAdjective] state. Let us rekindle nationalist sentiment and the dream of a great [MON.GetNonIdeologyName]."

 MON_remember_the_khovsgol_uprising:0 "Remember the Khövsgöl Uprising"
 MON_remember_the_khovsgol_uprising_desc:0 "In 1932, the people rose up against the brutal collectivisation imposed by the Communist government, first in a monastery in [820.GetName] province and then across the country. The rebellion caused the government to halt their ruinous economic policies, but it is only a matter of time before they try again. The people must be reminded that if they wish to be free, they will have to fight for it."
 MON_nationalists:0 "Nationalists"

 MON_weapons_caches:0 "Weapons Caches"
 MON_weapons_caches_desc:0 "We may not have access to the same level of resources as the [SOV.GetAdjective]-backed regime, but every Mongolian family has a rifle to take up in defence of their country."
 MON_weapons_caches_tt:0 "At the start of the civil war, we will gain 1,000 §Y$infantry_equipment$§!."

 MON_radicalise_the_clergy:0 "Radicalise the Clergy"
 MON_radicalise_the_clergy_desc:0 "The Buddhist priests have perhaps suffered the most of all Mongolians under the Communists, and we can only expect that oppression to get worse. The will be all too happy to support a movement to overthrow the [SOV.GetAdjective]-backed regime."

 MON_throw_off_the_yoke:0 "Throw off the Yoke"
 MON_throw_off_the_yoke_desc:0 "After a taste of independence, it is unbearable to once again be reduced to a vassal state. We must throw off the [SOV.GetAdjective] yoke and reclaim our freedom."
 MON_throw_off_the_yoke_tt:0 "§RWe will start a civil war!§!"

 MON_the_setsen_khan:0 "The Setsen Khan"
 MON_the_setsen_khan_desc:0 "The only man capable of lending legitimacy to the nationalist movement is Navaanneren, the last surviving ruler of the four Aimags under Bogd Khan. We will appeal to him to be our Prime Minister and regent and restore order to [MON.GetNameDef]."
 MON_lamaists:0 "Lamaists"

 MON_radical_youth_movement:0 "Radical Youth Movement"
 MON_radical_youth_movement_desc:0 "Unfortunately, a huge number of the greatest Mongol statesmen were killed in the fighting that engulfed [MON.GetNonIdeologyName] in the early 1920s. The Communists have since been successful in purging many of the rest. We must rely on a new generation of radical [MON.GetAdjective] nationalists if our country is to rise again."

 MON_dismounting_and_governing:0 "Dismounting and Governing"
 MON_dismounting_and_governing_desc:0 "While a few ringleaders must of course be dealt with, the majority of those who worked in the old government were simply trying to serve [MON.GetNameDef] to the best of their abilities. Given the number of external enemies we face, the pragmatic thing to do is to pardon and reconcile with them."

 MON_had_you_not_committed_great_sins:0 "Had You Not Committed Great Sins"
 MON_had_you_not_committed_great_sins_desc:0 "[MON.GetNameDefCap]'s destiny is to rule, not to be ruled. Those who collaborated with Stalin are cowards and traitors, and must be punished without mercy. Only with complete commitment to the cause of independence will we prevail."
 MON_had_you_not_committed_great_sins_tt:0 "Communist-aligned advisors will be retired."

 MON_rebuilding_the_country:0 "Rebuilding the Country"
 MON_rebuilding_the_country_desc:0 "A descade and a half of disastrous Stalinist policies have left our economy and society in tatters. We must put our country back together, piece by piece."

 MON_freedom_of_religion:0 "Freedom of Religion"
 MON_freedom_of_religion_desc:0 "The old [SOV.GetAdjective]-backed government did everything it could to repress Buddhism, crippling [MON.GetAdjective] intellectual and spiritual leadership. Guaranteeing freedom of religion, including to religious minorities, will begin to reverse the damage and show the people that we will govern justly."

 MON_buryat_refugees:0 "Buryat Refugees"
 MON_buryat_refugees_desc:0 "The Buryats to our north suffer even now under [SOV.capital.GetCapitalVictoryPointName]'s heel. Having already won our indepepndence, we have a responsibility to the wider Mongolic peoples. We must become the protector of the [BYA.GetNonIdeologyAdjective] people, first by welcoming refugees and then by liberating [564.GetName] itself."

 MON_mengjiang_officials:0 "Mengjiang Officials"
 MON_mengjiang_officials_desc:0 "Inner Mongolia has always been closer to the administrative heart of the Chinese Empire. Now that we are the sole independent Mongol state, we may be able to attract former Inner Mongolian officials and make use of their skills ourselves."

 MON_elevated_by_the_many:0 "Elevated by the Many"
 MON_elevated_by_the_many_desc: "[MON.GetNameDefCap] is not just a country of khans and lamas; every humble herdsman is part of the fabric of our nation. We should bolster the power of the Great Khural to give the common man a greater voice in the government of the country."

 MON_capitalist_investment:0 "Capitalist Investment"
 MON_capitalist_investment_desc:0 "We have a vast land and huge natural resources, waiting to be unlocked. Opening our markets will attract the investment we need to prosper."
 MON_capitalist_investment_tt:0 "We will receive an off-map §YCivilian Factory§! for every Demoocratic major with an opinion of us above 85."

 MON_join_the_allies:0 "Join the Allies"
 MON_join_the_allies_desc:0 "We need to seek likeminded friends if we are to survive. An application to join the Allies will grant us some much-needed protection."

 MON_pan_mongol_state:0 "Pan-Mongol State"
 MON_pan_mongol_state_desc:0 "The legacy of the Mongol conquests is a great Mongolic diaspora, spread all across Asia. Now, though, we must call on these people to return and fight for their homeland in its hour of need."

 MON_bogd_khans_legacy:0 "Bogd Khan's Legacy"
 MON_bogd_khans_legacy_desc:0 "Bogd Khan led [MON.GetNonIdeologyNameDef] from the revolution of 1911 until his death in 1924. Under his benevolent rule, [MON.GetNonIdeologyNameDef] achieved its first taste of freedom in centuries. We will not forget his example."

 MON_tibetan_lamas:0 "Tibetan Lamas"
 MON_tibetan_lamas_desc:0 "The Buddhist institutions in [MON.GetNameDef] have been devastated by years of Communist oppression. We must rebuild them. We should begin by increasing our connections to [TIB.GetNameDef], the heart of Gelug School Buddhism."

 MON_ninth_jebtsundamba_khutuktu:0 "Ninth Jebtsundamba Khutuktu"
 MON_ninth_jebtsundamba_khutuktu_desc:0 "[TIB.GetAdjectiveCap] lamas have told us of a boy whom they have recognised as the ninth Jebtsundamba Khutuktu, the reincarnation of our beloved Bogd Khan. While he is too young to play an active role in our government, all [MON.GetNonIdeologyAdjective]s will rejoice to learn of his return to our capital. Long live the Holy Lama, who sits upon the throne of Tsongkhapa!"

 MON_grant_new_titles:0 "Grant New Titles"
 MON_grant_new_titles_desc:0 "The [MON.GetAdjective] nobility has been decimated by decades of war and occupation. Having restored a free Khanate, we can now begin to replenish the ranks of the nobility by conferring titles and seals of office upon our most gallant officers."
 MON_grant_new_titles_tt:0 "Modify §Y$MON_legacy_of_the_khans_dynamic_modifier$§! by \n$MODIFIER_AIR_ACE_GENERATION_CHANCE$: §G+20.00%§! \n$MODIFIER_XP_GAIN_FACTOR$: §G+20.0%§! \n$MODIFIER_GRANT_MEDAL_COST_FACTOR$: §G-20.0%§! \n"

 MON_third_neighbour_policy:0 "Third Neighbour Policy"
 MON_third_neighbour_policy_desc:0 "Our geopolitical position is precarious, sandwiched as we are between [SOV.GetNameDef] and [CHI.GetNameDef]. We must reach out to other countries and develop new alliances if we are to secure our independence."

 MON_protect_tibet:0 "Protect Tibet"
 MON_protect_tibet_desc:0 "[TIB.GetNameDefCap], the heartland of the Yellow Hat school of Buddhism, is in a vulnerable position. Despite their remote location, both [CHI.GetNameDef] and [ENG.GetNameDef] have sought to extend influence over the country. We must put a stop to this imperialism."

 MON_yellow_hat_alliance:0 "Yellow Hat Alliance"
 MON_yellow_hat_alliance_desc:0 "Vague guarantees are not enough; we should seek an active alliance with [TIB.GetNameDef]. Only by demonstrating strength and unity to the outside world will we be able to preserve our way of life."
 MON_lhasa_pact:0 "Lhasa Pact"

 MON_invite_bhutan:0 "Invite Bhutan"
 MON_invite_bhutan_desc:0 "[BHU.GetNameDefCap] adopted a policy of isolationism to avoid excessive [ENG.GetAdjective] interference in their internal affairs, while reluctantly accepting [ENG.GetAdjective] suzerainty. Now that the political landscape has changed, they may be willing to alter their policy."

 MON_beasts_men_and_gods:0 "Beasts, Men and Gods"
 MON_beasts_men_and_gods_desc:0 "The land of bloody conquerors, of prophets, socerors and witches; the land of nude mountains, of plains burned by the sun and killed by the cold, of mountains inhabited by demons; of sacred lakes swarming with fish, of wild horses, ferocious dogs and rapacious birds of prey: that is how outsiders know [MON.GetNonIdeologyName]. It is well that they fear us, for all who enter our lands with ill-intent are surely doomed to perish here."
 MON_beasts_men_and_gods_tt_tib:0 "(§Y[MON.GetNameWithFlag]§! and §Y[TIB.GetNameWithFlag]§!): "
 MON_beasts_men_and_gods_tt_bhu:0 "([MON.GetNameWithFlag]§! and §Y[BHU.GetNameWithFlag]§!): "
 MON_beasts_men_and_gods_tt_tib_bhu:0 "(§Y[MON.GetNameWithFlag]§!, §Y[TIB.GetNameWithFlag]§!, §Y[BHU.GetNameWithFlag]§!): "

 MON_purchase_japanese_aircraft:0 "Purchase Japanese Aircraft"
 MON_purchase_japanese_aircraft_desc:0 "[JAP.GetNameDefCap] is the only major power in the region that is likely to be sympathetic to our struggle for independence. Establishing a commercial relationship with them will bring our two countries closer together, as well as modernising our armed forces."

 MON_join_the_coprosperity_sphere:0 "Join the Co-Prosperity Sphere"
 MON_join_the_coprosperity_sphere_desc:0 "[JAP.GetNameDefCap] has ambitions to create a union of east Asian states in opposition to western imperialism. More importantly, they may be willing to help us in our struggle for independence against [CHI.GetNameDef] and [SOV.GetNameDef]. We should join this project."

 MON_integrate_mengkukuo:0 "Integrate Mengkukuo"
 MON_integrate_mengkukuo_desc:0 "Our new friends in [JAP.GetNameDef] created a puppet state in Inner Mongolia in opposition to the old, Soviet-backed government. Now that we have expelled that government, it makes little sense to maintain the two states. The [JAP.GetAdjective] will surely prefer a strong ally to a flimsy puppet."

 MON_japanese_naval_designs:0 "Japanese Naval Designs"
 MON_japanese_naval_designs_desc:0 "[JAP.GetNameDefCap]'s naval doctrine is far more advanced than ours. We can kick-start our naval development by using them as a model."

 MON_tame_the_dragon:0 "Tame the Dragon"
 MON_tame_the_dragon_desc:0 "[CHI.GetNameDefCap] threatens not only our ambitions for greatness but our very existence. The [CHI.GetAdjective] may have rejected their Emperor, but they have not forgotten their imperial claims on our land. We must strike now, while they are weak and divided, if our country has any hope of long-term independence."

 MON_revive_the_yuan:0 "Revive the Yuan"
 MON_revive_the_yuan_desc:0 "Mongols ruled [CHI.GetNonIdeologyNameDef] for nearly a century at the height of the Mongol Empire. Now that we have retaken their old capital, our legitimacy might be strengthened by adopting their banner."
 MON_revive_the_yuan_VP_9843:0 "Khanbaliq"
 MON_revive_the_yuan_608:0 "Yuan Dadu"

 MON_avenging_lamas:0 "Avenging Lamas"
 MON_avenging_lamas_desc:0 "Under Communist rule, the Buddhist clergy were forced to retreat into their monasteries and lay low. Now that we have restored them to their former prominence, they will surely be willing to help us in our war effort."

 MON_the_black_banner:0 "The Black Banner"
 MON_the_black_banner_desc:0 "The Shankh Monastery in the Orkhon Valley holds one of the great treasures of the [MON.GetAdjective] people, the black war banner of Genghis Khan. Raising aloft this powerful symbol of [MON.GetAdjective] greatness, we shall march to war once again!"
 MON_the_black_banner_tt:0 "Modify §Y$MON_legacy_of_the_khans_dynamic_modifier$§! by \n$MODIFIER_CONSCRIPTION_FACTOR$: §Y2.50%§! \n"

 MON_the_wealth_of_noyons:0 "The Wealth of Noyons"
 MON_the_wealth_of_noyons_desc:0 "While the great power of various warlords has been disastrous for China, the nobility in [MON.GetNonIdeologyNameDef] is united by decades of struggle and common purpose. We can supplement our forces by encouraging them to use their wealth to establish and finance private armies."

 MON_court_the_princes:0 "Court the Princes"
 MON_court_the_princes_desc:0 "The Inner Mongolian princes should have joined our bid for independence in 1911, but they hesitated out of fear. Now, they find themselves trapped under the [JAP.GetAdjective] thumb. We will free them from this tyranny, however it must be done."

 MON_the_mad_baron:0 "The Mad Baron"
 MON_the_mad_baron_desc:0 "In 1919, Baron Ungern-Sternberg entered [MON.GetNonIdeologyNameDef] and liberated the country from [CHI.GetNonIdeologyAdjective] occupation. Though he ultimately failed to prevent the Bolsheviks from taking over the country, he is still held in high regard throughout [MON.GetNameDef]. We should honour his memory, and offer some of his surviving compatriots a place in our government."

 MON_prosecute_the_white_cause:0 "Prosecute the White Cause"
 MON_prosecute_the_white_cause_desc:0 "We have managed to free our own country from the clutches of Bolshevism, but the Revolution is alive and well in [SOV.GetNameDef]. We will never be secure with such an aggressive neighbour. Let us rid the world of this scourge once and for all."

 MON_winter_warfare:0 "Winter Warfare"
 MON_winter_warfare_desc:0 "As we push farther north into the [SOV.GetNonIdeologyAdjective] heartland, strong supply lines, as well as a tolerance for hardship, will be our most important weapons in the fight ahead."

 MON_invite_foreign_advisers:0 "Invite Foreign Advisors"
 MON_invite_foreign_advisers_desc:0 "The Bogd Khanate employed many foreigners in its government, where they could provide valuable expertise. We should adopt the same policy."

 MON_western_technology_mongolian_spirit:0 "Western Technology, [MON.GetNonIdeologyAdjective] Spirit"
 MON_western_technology_mongolian_spirit_desc:0 "Western ideas like communism have been disastrous for our country, but it is clear that we have much to learn from their technology. Japan has been successful in adopting modern technology without compromising their national identity. We should apply this model in [MON.GetNameDef] as well."

###################################
### GREATER MONGOLIA SUB BRANCH ###
###################################

 MON_reclaim_inner_mongolia:0 "Reclaim Inner Mongolia"
 MON_reclaim_inner_mongolia_desc:0 "When Outer Mongolia declared its independence in 1911, petty quarrelling in Inner Mongolia paralysed the region and allowed the [CHI.GetNonIdeologyAdjective] to reimpose control. Our first move must be to reunite with our brothers in the south."

 MON_northern_claims:0 "Northern Claims"
 MON_northern_claims_desc:0 "[ALT.GetNonIdeologyNameDefCap], [TAN.GetNonIdeologyNameDef] and [BYA.GetNonIdeologyNameDef] have never been entirely at home in the [SOV.GetNonIdeologyAdjective] orbit, and all three have recently had conflicts with the [SOV.GetAdjective] authorities. In truth, these peoples really belong to the wider [MON.GetNonIdeologyAdjective] family, and the political situation should reflect this."

 MON_silver_dragon_regiments:0 "Silver Dragon Regiments"
 MON_silver_dragon_regiments_desc:0 "Though Inner Mongolia is of course our rightful territory, many Han and other non-Mongol ethnic groups now also dwell there. We will recruit these peoples into special regiments under the silver dragon banner of the old [MAN.GetNonIdeologyAdjective] Empire."

 MON_proclaim_greater_mongolia:0 "Proclaim Greater Mongolia"
 MON_proclaim_greater_mongolia_desc:0 "We have come a long way towards uniting the [MON.GetNonIdeologyAdjective] lands. No more will we be carved up and haggled over by other powers. Now, let us proclaim the rise of Greater Mongolia to the world."
 MON_proclaim_greater_mongolia_tt:0 "Unlocks decisions to core claimed states."

 MON_land_of_the_mongols:0 "Land of the Mongols"
 MON_land_of_the_mongols_desc:0 "[SIN.GetNameDef] was once the heart of the Chagatai Khanate, and many Mongols still live there. Even today, it is known by many as Moghulistan, or the 'land of the Mongols.'"

 MON_pax_mongolica:0 "Pax Mongolica"
 MON_pax_mongolica_desc:0 "Our realm now includes many areas with large non-Mongol populations. We must turn now to the governance of our new territories. All of our subjects will prosper under our just rule."
 MON_pax_mongolica_tt:0 "Unlocks occupation law:\n"

#######################
### MILITARY BRANCH ###
#######################

 MON_manchurian_conference:0 "The Manchurian Conference"
 MON_manchurian_conference_desc:0 "Minor border skirmishes with our neighbours in [MAN.GetNameDef] have been ongoing for several years now. It is clear that our army is in no state to fight a serious war. We should call a conference to put an end to the fighting."

 MON_mongolian_army_air_corps:0 "Mongolian Army Air Corps"
 MON_mongolian_army_air_corps_desc:0 "Our air force is not large enough to require its own independent command structure. By integrating it into the army, we will ensure good cooperation between the branches and give more of our soldiers experience with friendly air power."
 MON_mongolian_army_air_corps_tt:0 "Two random Generals will gain Air Command roles."

 MON_study_fighter_design:0 "Study Fighter Design"
 MON_study_fighter_design_desc:0 "Light aircraft are critical to securing air superiority and are more viable starting point for the air force of a smaller nation like [MON.GetNameDef]."

 MON_expand_pilot_training_initiatives:0 "Expand Pilot Training Initiatives"
 MON_expand_pilot_training_initiatives_desc:0 "Aircraft is no use without the pilots to fly it, and pilots cannot be trained overnight. We must prepare a cadre of new pilots to man our expanding air force."
 Damchaagiin:0 "Damchaagiin"
 Demberel:0 "Demberel"
 Hero:0 "Hero"

 MON_sons_of_tengri:0 "Sons of Tengri"
 MON_sons_of_tengri_desc:0 "Tengri is the name of the great sky-father in the old Mongolic and Turkic shamanism. Our ancestors, bound to the earth, could only look up at him in awe, but now we are able to take to the skies and ride with Tengri himself!"

 MON_long_range_aircraft:0 "Long-Range Aircraft"
 MON_long_range_aircraft_desc:0 "Asia is a vast continent, and we need to be able to project power across a huge area. Heavier aircraft will allow us to conduct operations as far from our airfields as is needed."

 MON_domestic_aviation_industry:0 "Domestic Aviation Industry"
 MON_domestic_aviation_industry_desc:0 "We have long relied on imported aircraft for our air force. This has been beneficial in the short term, but we will need to cultivate an aviation industry of our own if we wish to keep up with our rivals."

 MON_advanced_industrial_methods:0 "Advanced Industrial Methods"
 MON_advanced_industrial_methods_desc:0 "Cutting-edge aircraft requires cutting-edge industry. Superior production technology at home will give our forces the tools they need to secure victory on the battlefield."

 MON_raise_military_spending:0 "Raise Military Spending"
 MON_raise_military_spending_desc:0 "War looms in Asia, and we must be ready for it if we wish to survive. We must urgently raise the military budget and increase our war production."

 MON_sukhbaatar_general_military_higher_school:0 "Sükhbaatar General Military Higher School"
 MON_sukhbaatar_general_military_higher_school_desc:0 "Named after the father of [MON.GetNameDef]'s revolution, the General Military Higher School will prepare our officers for battle."
 MON_sukhbaatar_general_military_higher_school_tt:0 "A random General will gain the §Y$military_theorist$§! role."
 MON_sukhbaatar_general_military_higher_school_tt2:0 "Modify §Y$MON_legacy_of_the_khans_dynamic_modifier$§! by \n$MODIFIER_MAX_COMMAND_POWER_MULT$: §G+10%§! \n"

 MON_khalkhas_soldiers:0 "Khalkha's Soldiers"
 MON_khalkhas_soldiers_desc:0 "Given the small size of our country's population, we cannot field the huge armies of [SOV.GetNameDef] or [CHI.GetNameDef]. Our forces must be deployed sparingly, in the right place at the right time. Speed, reconnaissance and knowledge of the terrain will see us to victory."
 MON_khalkhas_soldiers_tt:0 "Improves §Y$recon$§! Reconnaissance by §G+200.0%§!."

 MON_born_in_the_saddle:0 "Born in the Saddle"
 MON_born_in_the_saddle_desc:0 "[MON.GetNameDefCap] is famed throughout the worlf for its cavalry, and for good reason. Though technology has changed significantly since Genghis Khan rose the steppes, mounted troops will continue to serve a primary role in our armies in the conflict to come."
 MON_born_in_the_saddle_tt:0 "Modify §Y$MON_legacy_of_the_khans_dynamic_modifier$§! by \n$cavalry$ Attack: §G+5.0%§! \n$cavalry$ Defense: §G+5.0%§! \n$cavalry$ Speed: §G+5.0%§! \n"

 MON_shock_tactics:0 "Shock Tactics"
 MON_shock_tactics_desc:0 "On the modern battlefield, cavalry cannot stand up to prolonged fire or wars of attrition. A swift strike to overwhelm the enemy is our path to victory."
 MON_shock_tactics_tt:0 "Modify §Y$MON_legacy_of_the_khans_dynamic_modifier$§! by \n$cavalry$ Attack: §G+5.0%§! \n$cavalry$ Speed: §G+5.0%§! \n"
 MON_shock_tactics_tt2:0 "Enables an improved version of §Y$tactic_shock$§! tactics."

 MON_modernising_the_cavalry:0 "Modernising the Cavalry"
 MON_modernising_the_cavalry_desc:0 "Horses will always have their place in [MON.GetAdjective] society, but we must adapt to the realities of modern war. The same mobile tactics that served the Mongols of ages past can now be executed more effectively using wheeled, not hoofed, mounts."
 MON_modernising_the_cavalry_tt:0 "Modify §Y$MON_legacy_of_the_khans_dynamic_modifier$§! by \n$motorized$ Attack: §G+10.0%§! \n$motorized$ Defense: §G+10.0%§! \n"

 MON_living_off_the_land:0 "Living off the Land"
 MON_living_off_the_land_desc:0 "We Mongols are used to hardship and to getting by with what we can find. We will encourage our soldiers to acquire what they need from the land around them. A little privation is temporary; the victories of our armies are eternal!"
 MON_living_off_the_land_tt:0 "Modify §Y$MON_legacy_of_the_khans_dynamic_modifier$§! by \n$MODIFIER_SUPPLY_CONSUMPTION_FACTOR$: §G-20.0%§! \n$MODIFIER_OUT_OF_SUPPLY_FACTOR$: §G-20.0%§! \n"

 MON_under_the_blue_sky:0 "Under the Blue Sky"
 MON_under_the_blue_sky_desc:0 "[MON.GetNameDef] is a land of extremes, scorching summers and freezing winters. Our people are hardy and will not shy away from the trials that await them in our struggle for independence."
 MON_under_the_blue_sky_tt:0 "Modify §Y$MON_legacy_of_the_khans_dynamic_modifier$§! by \n$MODIFIER_WINTER_ATTRITION_FACTOR$: §G-25.0%§! \n$MODIFIER_HEAT_ATTRITION_FACTOR$: §G-25.0%§! \n"

MON_armoured_car_focus:0 "Armoured Car Development"
MON_armoured_car_focus_desc:0 "Full-scale tank production is not a possibility for us at present, given our modest industrial base. Armoured car may be a more practical alternative, giving us an edge over our peers."

 MON_armour_experiments:0 "Armour Experiments"
 MON_armour_experiments_desc:0 "Mounted troops will only get us so far; in some situations we will need more heavily armoured forces. Tanks will form the tip of the spear of our armies."

 MON_cavalry_tanks:0 "Cavalry Tanks"
 MON_cavalry_tanks_desc:0 "Tanks will be of no use if they cannot keep up with our cavalry. Fast and agile tanks must be our priority, even if it means trading off protection."
 MON_cavalry_tanks_tt:0 "Modify §Y$MON_legacy_of_the_khans_dynamic_modifier$§! by \n$EQUIPMENT_ARMOR$ Speed: §G+10.0%§! \n"

 MON_armoured_corps:0 "Armoured Corps"
 MON_armoured_corps_desc:0 "Where the fighting is thickest, even motorised troops may be insufficient. A mechanised corps will allow us to enter any battlefield with confidence."
 MON_armoured_corps_tt:0 "Modify §Y$MON_legacy_of_the_khans_dynamic_modifier$§! by \n$mechanized$ Attack: §G+10.0%§! \n$mechanized$ Defense: §G+10.0%§! \n"

 MON_modern_military:0 "Modern Military"
 MON_modern_military_desc:0 "Perhaps [MON.GetNameDef]'s greatest asset is our ability to adopt new ideas when they prove useful. The great Khans of history would not have shunned the new inventions of their day out of some misplaced sentimentality, and neither should we."
 MON_modern_military_tt:0 "Modify §Y$MON_legacy_of_the_khans_dynamic_modifier$§! by \n$MODIFIER_RESEARCH_SPEED_FACTOR$: §G+5.00%§! \n"

 MON_arm_the_nation:0 "Arm the Nation"
 MON_arm_the_nation_desc:0 "Our army will be useless without the weapons to fight. We have been reliant on imported guns for far too long. We will need our own arms industry if we are to sustain a prolonged war."

 MON_heavy_weapons_industry:0 "Heavy Weapons Industry"
 MON_heavy_weapons_industry_desc:0 "The regimental guns provided to us by [SOV.GetNameDef] are not sufficient for intensive fighting, leaving us out-ranged by serious opponents. We must equip our army with the divisional and corps guns they will need to compete on modern battlefields."

 MON_naval_experiments:0 "Naval Experiments"
 MON_naval_experiments_desc:0 "A great power needs a strong navy. As a landlocked country, [MON.GetNameDef] has obviously been lacking in this area. If we could gain access to a coastline, we could begin to remedy this inadequacy. Failing that, control of Lake Baikal would give us the opportunity for some intial experiments."

 MON_naval_cadet_corps:0 "Naval Cadet Corps"
 MON_naval_cadet_corps_desc:0 "Being a landlocked country, [MON.GetNameDef] has essentially no naval tradition. Establishing a naval academy should be a high priority, so that our officers are adequately prepared to go into battle."

 MON_establish_shipbuilding_industry:0 "Establish Shipbuilding Industry"
 MON_establish_shipbuilding_industry_desc:0 "Now that we have access to a sizeable coastline, we can fund the creation of a [MON.GetAdjective] shipbuilding industry with which to construct our fledgling navy."
 MON_establish_shipbuilding_industry_tt:0 "Adds §G1§! Building Slot and §Y1 Naval Dockyard§! in every coastal state. (Max. 10)"

 MON_submarine_designs:0 "Submarine Designs"
 MON_submarine_designs_desc:0 "We cannot risk open confrontation with major naval powers. We should focus on building a submarine fleet that will allow us to project power without such great risk."

 MON_a_grand_navy:0 "A Grand Navy"
 MON_a_grand_navy_desc:0 "We may be late to the naval race, but that is no reason to compromise. The [MON.GetAdjective] navy will soon rival those of the great powers of the world."

 MON_avenge_kublai_khan:0 "Avenge Kublai Khan"
 MON_avenge_kublai_khan_desc:0 "At the height of the Mongol Empire, Kublai Khan attempted to extend Mongolian dominion over the Japanese islands. The invasion met initial success, but was ultimately defeated, largely due to two typhoons which struck the fleet. We will succeed where the great Kublai Khan failed."

 MON_new_trading_opportunities:0 "New Trading Opportunities"
 MON_new_trading_opportunities_desc:0 "Our new coastline opens us up to global trade. We should take full advantage of this opportunity."

 MON_state_university:0 "State University"
 MON_state_university_desc:0 "We must invest in the elite of the future."