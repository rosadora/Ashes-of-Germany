 LOADING_TIP_154: "Our nation, once united, shall see no destination as unreachable.\n - Damdin Sükhbaatar, Father of the Mongolian Revolution"
 LOADING_TIP_155: "On earth there are two great geniuses - Buddha and Lenin.\n - Peljidiin Genden"
 LOADING_TIP_156: "You bloody Georgian, you have become a new Russian Tsar!\n - Peljidiin Genden, to Joseph Stalin"
 LOADING_TIP_157: "It is truly unbearably sad that the Mongolian nation fell so low that it met the fate of becoming the trading post of other nations.\n - Anandyn Amar"
 LOADING_TIP_158: "I was one of the first to devote myself to the development of my country, and my heart breaks when I finally see myself called a traitor.\n - Anandyn Amar"
 LOADING_TIP_159: "It is important for Mongolians to find their freedom. As for what they do when they find freedom, they will presumably know themselves.\n - Khorloogiin Choibalsan"