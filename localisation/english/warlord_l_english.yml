 CHI_prepare_resistance:0 "[GetCHIPrepareResistanceName]"

 CHI_NORM_RESISTANCE:0 "Prepare Resistance"
 CHI_NATI_RESISTANCE:0 "Prepare KMT Resistance Pockets"
 CHI_COMI_RESISTANCE:0 "Contact CPC Guerillas"
 CHI_prepare_resistance_desc:0 "The shadow of Japanese imperialism is looming over us, the possibility of capitulation should be considered, but not that of surrender. We can prepare a network for guerilla warfare if the Japanese would be so foolish enough to invade us."


 CHI_new_divisions:0 "[Root.GetCHINewDivisionsName]"

 CHI_NORM_NEW_DIVS:0 "Hire Merceneries"
 CHI_NATI_NEW_DIVS:0 "Request Reassignment"
 CHI_COMI_NEW_DIVS:0 "Organize Communist Partisans"
 CHI_new_divisions_desc:0 "We have to get a hold of new troops if we are to aid in the war against the Japanese!"

 CHI_intelligence_network_focus:0 "[Root.GetCHIIntelligenceNetworkName]"

 CHI_NORM_INF:0 "Recruit Infiltration Specialists"
 CHI_NATI_INF:0 "KMT Infiltration Specialists"
 CHI_COMI_INF:0 "Train Infiltration Partisans"
 CHI_intelligence_network_focus_desc:0 "We have to hinder the Japanese in every way possible, infiltrating them and figuring out their weaknesses is the best thing we can do."

