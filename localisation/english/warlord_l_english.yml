 CHI_NORM_FAC:0 "Obtain Foreign Arms"
 CHI_NATI_FAC:0 "National Industrial Handout"
 CHI_COMI_FAC:0 "Steal Nationalist Arms"
 CHI_factories_desc:0 "We cannot rely on others to supply us with rifles, if we acquire industry of some kind we can continue our own arms production, albe it elsewhere."

 WL_warlord.1.t:0 "[CHI.GetLeader] transfers 8 divisions!"
 WL_warlord.1.desc:0 "After our troops surrendered like cowards, [CHI.GetLeader] was wise enough to transfer new forces to our command so we may keep up the fight!"
 WL_warlord.1.a:0 "We will get to work right away!"

 WL_warlord.2.t:0 "10 Partisan Militias Organize!"
 WL_warlord.2.desc:0 "After the losses of the land spread, partisans gathered in our defense and formed militias. The workers shall never be defeated!"
 WL_warlord.2.a:0 "Into battle!"